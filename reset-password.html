<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Restablecer Contraseña - Chepita</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4a1d6d 0%, #7b2c8d 50%, #A63C89 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a1d6d;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e8e8f0;
            border-radius: 24px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #A63C89;
        }
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 20px;
            font-size: 13px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .info-card {
            background: #f5f0ff;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .info-card p {
            font-size: 13px;
            color: #4a1d6d;
            margin: 4px 0;
        }
        .info-card strong {
            color: #A63C89;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
        .footer a {
            color: #A63C89;
            text-decoration: none;
        }
        .requirements {
            font-size: 11px;
            color: #999;
            margin-top: 12px;
            text-align: left;
        }
        .requirements ul {
            margin-left: 20px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Restablecer Contraseña</h1>
        <div class="subtitle">Chepita Sistema de Gestion</div>

        <div id="infoSection" class="info-card" style="display: none;">
            <p>Usuario: <strong id="infoUsuario"></strong></p>
            <p>Email: <strong id="infoEmail"></strong></p>
            <p>Tipo: <strong id="infoTipo"></strong></p>
        </div>

        <div class="input-group">
            <label>Nueva contraseña</label>
            <input type="password" id="nuevaPassword" placeholder="Ingresa tu nueva contraseña">
        </div>
        <div class="input-group">
            <label>Confirmar contraseña</label>
            <input type="password" id="confirmarPassword" placeholder="Confirma tu nueva contraseña">
        </div>

        <div class="requirements">
            Requisitos para Admin:
            <ul>
                <li>Minimo 8 caracteres</li>
                <li>Al menos una mayuscula</li>
                <li>Al menos un numero</li>
            </ul>
        </div>

        <button class="btn btn-primary" id="btnRestablecer" onclick="restablecerPassword()">Restablecer Contraseña</button>

        <div id="message" class="message"></div>

        <div class="footer">
            <a href="/">Volver al inicio</a>
        </div>
    </div>

    <script>
        let token = null;
        let tipoUsuario = null; // 'admin' o 'trabajador'
        let idUsuario = null;

        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        token = urlParams.get('token');

        if (!token) {
            mostrarMensaje('Enlace invalido. No se encontro token.', 'error');
            document.getElementById('btnRestablecer').disabled = true;
        } else {
            verificarToken();
        }

        async function verificarToken() {
            try {
                // Primero intentar como admin
                let response = await fetch(`/api/admin/verificar-token-recuperacion/${token}`);
                let data = await response.json();
                
                if (data.valido) {
                    tipoUsuario = 'admin';
                    document.getElementById('infoSection').style.display = 'block';
                    document.getElementById('infoUsuario').innerText = 'Administrador';
                    document.getElementById('infoEmail').innerText = 'Administrador Chepita';
                    document.getElementById('infoTipo').innerHTML = '<span style="color:#A63C89;">Admin</span>';
                    return;
                }
                
                // Si no es admin, intentar como trabajador
                response = await fetch(`/api/trabajadores/verificar-token-recuperacion/${token}`);
                data = await response.json();
                
                if (data.valido) {
                    tipoUsuario = 'trabajador';
                    idUsuario = data.id_trabajador;
                    document.getElementById('infoSection').style.display = 'block';
                    document.getElementById('infoUsuario').innerText = data.nombre || 'Trabajador';
                    document.getElementById('infoEmail').innerText = data.email || 'Sin email';
                    document.getElementById('infoTipo').innerHTML = '<span style="color:#4a1d6d;">Vendedor</span>';
                } else {
                    mostrarMensaje('El enlace ha expirado o ya fue usado. Solicita un nuevo enlace de recuperacion.', 'error');
                    document.getElementById('btnRestablecer').disabled = true;
                }
            } catch (error) {
                console.error('Error verificando token:', error);
                mostrarMensaje('Error de conexion. Intenta de nuevo mas tarde.', 'error');
                document.getElementById('btnRestablecer').disabled = true;
            }
        }

        async function restablecerPassword() {
            const nuevaPassword = document.getElementById('nuevaPassword').value;
            const confirmarPassword = document.getElementById('confirmarPassword').value;

            if (!nuevaPassword || !confirmarPassword) {
                mostrarMensaje('Por favor, completa ambos campos.', 'error');
                return;
            }

            if (nuevaPassword !== confirmarPassword) {
                mostrarMensaje('Las contraseñas no coinciden.', 'error');
                return;
            }

            // Validaciones según tipo
            if (tipoUsuario === 'admin') {
                if (nuevaPassword.length < 8) {
                    mostrarMensaje('La contraseña debe tener al menos 8 caracteres.', 'error');
                    return;
                }
                if (!/[A-Z]/.test(nuevaPassword)) {
                    mostrarMensaje('La contraseña debe contener al menos una mayuscula.', 'error');
                    return;
                }
                if (!/[0-9]/.test(nuevaPassword)) {
                    mostrarMensaje('La contraseña debe contener al menos un numero.', 'error');
                    return;
                }
            } else {
                if (nuevaPassword.length < 4) {
                    mostrarMensaje('La contraseña debe tener al menos 4 caracteres.', 'error');
                    return;
                }
            }

            const btn = document.getElementById('btnRestablecer');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Procesando...';
            btn.disabled = true;

            try {
                let response;
                if (tipoUsuario === 'admin') {
                    response = await fetch('/api/admin/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, nuevaPassword })
                    });
                } else {
                    response = await fetch('/api/trabajadores/restablecer-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, nueva_password: nuevaPassword })
                    });
                }

                const data = await response.json();

                if (data.success) {
                    mostrarMensaje('Contraseña restablecida correctamente. Ya puedes iniciar sesion.', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    mostrarMensaje('Error: ' + data.message, 'error');
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexion: ' + error.message, 'error');
                btn.disabled = false;
            } finally {
                btn.innerHTML = originalText;
            }
        }

        function mostrarMensaje(texto, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texto;
            msgDiv.className = 'message ' + tipo;
            setTimeout(() => {
                if (tipo === 'success') return;
                msgDiv.className = 'message';
                msgDiv.textContent = '';
            }, 5000);
        }
    </script>
</body>
</html>
