<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Chepita</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4a1d6d 0%, #7b2c8d 50%, #A63C89 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a1d6d;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e8e8f0;
            border-radius: 24px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #A63C89;
        }
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #4a1d6d;
            margin-top: 10px;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 20px;
            font-size: 13px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .info-card {
            background: #f5f0ff;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .info-card p {
            font-size: 13px;
            color: #4a1d6d;
            margin: 4px 0;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
        .footer a {
            color: #A63C89;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recuperar Contraseña</h1>
        <div class="subtitle">Chepita Sistema de Gestión</div>

        <div id="formularioSolicitud">
            <div class="radio-group">
                <label>
                    <input type="radio" name="tipo" value="admin" checked> Administrador
                </label>
                <label>
                    <input type="radio" name="tipo" value="trabajador"> Vendedor
                </label>
            </div>
            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com">
            </div>
            <button class="btn btn-primary" id="btnEnviar" onclick="enviarRecuperacion()">Enviar correo de recuperación</button>
            <div class="footer">
                <a href="/">Volver al inicio</a>
            </div>
        </div>

        <div id="formularioReset" style="display: none;">
            <div class="info-card" id="infoUsuario"></div>
            <div class="input-group">
                <label>Nueva contraseña</label>
                <input type="password" id="nuevaPassword" placeholder="Ingresa tu nueva contraseña">
            </div>
            <div class="input-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmarPassword" placeholder="Confirma tu nueva contraseña">
            </div>
            <button class="btn btn-primary" id="btnRestablecer" onclick="restablecerPassword()">Restablecer Contraseña</button>
            <button class="btn btn-secondary" onclick="volverAlInicio()">Volver</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        let token = null;
        let tipoUsuario = null;

        const urlParams = new URLSearchParams(window.location.search);
        token = urlParams.get('token');
        tipoUsuario = urlParams.get('tipo');

        if (token && tipoUsuario) {
            document.getElementById('formularioSolicitud').style.display = 'none';
            document.getElementById('formularioReset').style.display = 'block';
            verificarToken();
        }

        async function verificarToken() {
            try {
                let response;
                if (tipoUsuario === 'admin') {
                    response = await fetch(`/api/admin/verificar-token-recuperacion/${token}`);
                } else {
                    response = await fetch(`/api/trabajadores/verificar-token-recuperacion/${token}`);
                }
                const data = await response.json();
                
                if (data.valido) {
                    const infoDiv = document.getElementById('infoUsuario');
                    infoDiv.innerHTML = `
                        <p>Usuario: <strong>${data.nombre || (tipoUsuario === 'admin' ? 'Administrador' : 'Vendedor')}</strong></p>
                        <p>Email: <strong>${data.email || 'Registrado en el sistema'}</strong></p>
                        <p>Tipo: <strong style="color:#A63C89;">${tipoUsuario === 'admin' ? 'Administrador' : 'Vendedor'}</strong></p>
                    `;
                } else {
                    mostrarMensaje('El enlace ha expirado o ya fue usado. Solicita un nuevo enlace.', 'error');
                    document.getElementById('btnRestablecer').disabled = true;
                }
            } catch (error) {
                mostrarMensaje('Error de conexión', 'error');
            }
        }

        async function enviarRecuperacion() {
            const email = document.getElementById('email').value;
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            
            if (!email) {
                mostrarMensaje('Ingresa tu correo electrónico', 'error');
                return;
            }
            
            const btn = document.getElementById('btnEnviar');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Enviando...';
            btn.disabled = true;
            
            try {
                let response;
                if (tipo === 'admin') {
                    response = await fetch('/api/admin/recuperar-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                } else {
                    response = await fetch('/api/trabajadores/recuperar-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                }
                
                const data = await response.json();
                
                if (data.success) {
                    mostrarMensaje(data.message || 'Correo enviado correctamente. Revisa tu bandeja de entrada o spam.', 'success');
                    document.getElementById('email').value = '';
                } else {
                    mostrarMensaje(data.message || 'Error al enviar el correo', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function restablecerPassword() {
            const nuevaPassword = document.getElementById('nuevaPassword').value;
            const confirmarPassword = document.getElementById('confirmarPassword').value;
            
            if (!nuevaPassword || !confirmarPassword) {
                mostrarMensaje('Completa ambos campos', 'error');
                return;
            }
            
            if (nuevaPassword !== confirmarPassword) {
                mostrarMensaje('Las contraseñas no coinciden', 'error');
                return;
            }
            
            if (tipoUsuario === 'admin' && nuevaPassword.length < 8) {
                mostrarMensaje('La contraseña debe tener al menos 8 caracteres', 'error');
                return;
            }
            
            if (tipoUsuario === 'trabajador' && nuevaPassword.length < 4) {
                mostrarMensaje('La contraseña debe tener al menos 4 caracteres', 'error');
                return;
            }
            
            const btn = document.getElementById('btnRestablecer');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Procesando...';
            btn.disabled = true;
            
            try {
                let response;
                if (tipoUsuario === 'admin') {
                    response = await fetch('/api/admin/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, nuevaPassword })
                    });
                } else {
                    response = await fetch('/api/trabajadores/restablecer-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, nueva_password: nuevaPassword })
                    });
                }
                
                const data = await response.json();
                
                if (data.success) {
                    mostrarMensaje('Contraseña restablecida correctamente. Redirigiendo...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    mostrarMensaje(data.message || 'Error al restablecer', 'error');
                    btn.disabled = false;
                }
            } catch (error) {
                mostrarMensaje('Error de conexión: ' + error.message, 'error');
                btn.disabled = false;
            } finally {
                btn.innerHTML = originalText;
            }
        }

        function volverAlInicio() {
            window.location.href = '/';
        }

        function mostrarMensaje(texto, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texto;
            msgDiv.className = 'message ' + tipo;
            setTimeout(() => {
                msgDiv.className = 'message';
                msgDiv.textContent = '';
            }, 5000);
        }
    </script>
</body>
</html>
