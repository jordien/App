<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Tienda Chepita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            top: -150px;
            right: -150px;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
        }

        .reset-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
            font-family: inherit;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: white;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .input-icon input:hover {
            border-color: #c4b5fd;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            color: #6b7280;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
            border-radius: 2px;
        }

        .strength-text {
            font-size: 11px;
            color: #6b7280;
            min-width: 50px;
            text-align: right;
        }

        .requisitos-lista {
            margin-top: 12px;
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-start;
        }

        .requisito {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
        }

        .requisito.valid {
            color: #10b981;
        }

        .requisito.invalid {
            color: #9ca3af;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .mensaje {
            margin-top: 24px;
            padding: 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mensaje.success {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .mensaje.error {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .mensaje.info {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .footer-note {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #9ca3af;
        }

        .footer-note a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .reset-container {
                padding: 32px 24px;
            }
            
            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>Restablecer Contraseña</h2>
        <p class="subtitle">Crea una nueva contraseña para tu cuenta de administrador</p>

        <form id="reset-form">
            <input type="hidden" id="token" name="token">

            <div class="input-group">
                <label>Nueva Contraseña</label>
                <div class="input-icon">
                    <input type="password" id="nuevaPassword" placeholder="Escribe tu nueva contraseña" required>
                    <span class="toggle-password" onclick="togglePassword('nuevaPassword')">👁</span>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-text" id="strengthText">Debil</span>
                </div>
                <div class="requisitos-lista" id="requisitosLista">
                    <span class="requisito" id="reqLongitud">• Minimo 4 caracteres</span>
                    <span class="requisito" id="reqMayuscula">• Mayuscula</span>
                    <span class="requisito" id="reqNumero">• Numero</span>
                </div>
            </div>

            <div class="input-group">
                <label>Confirmar Contraseña</label>
                <div class="input-icon">
                    <input type="password" id="confirmarPassword" placeholder="Confirma tu nueva contraseña" required>
                    <span class="toggle-password" onclick="togglePassword('confirmarPassword')">👁</span>
                </div>
            </div>

            <button type="submit" id="submitBtn">
                <span>Actualizar Contraseña</span>
            </button>
        </form>

        <div id="mensaje"></div>
        
        <div class="footer-note">
            <strong>Consejo:</strong> Usa una contraseña que no hayas usado antes.<br>
            <a href="/PAG.html">Volver al inicio de sesion</a>
        </div>
    </div>

    <script>
        let token = null;

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
        }

        function getTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        }

        async function verificarToken() {
            token = getTokenFromUrl();
            document.getElementById('token').value = token;

            if (!token) {
                mostrarMensaje('Enlace invalido o expirado. Por favor, solicita un nuevo restablecimiento de contraseña.', 'error');
                document.getElementById('reset-form').style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`/api/admin/verificar-token-recuperacion/${token}`);
                const data = await response.json();

                if (!data.valido) {
                    mostrarMensaje(data.message || 'El enlace ha expirado o ya fue usado. Solicita uno nuevo.', 'error');
                    document.getElementById('reset-form').style.display = 'none';
                    return;
                }
                
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error al verificar el enlace. Intenta de nuevo.', 'error');
                document.getElementById('reset-form').style.display = 'none';
            }
        }

        function mostrarMensaje(mensaje, tipo) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.innerHTML = `
                <div class="mensaje ${tipo}">
                    <strong>${tipo === 'success' ? 'Exito' : tipo === 'error' ? 'Error' : 'Informacion'}</strong><br>
                    ${mensaje}
                </div>
            `;
        }

        const nuevaPasswordInput = document.getElementById('nuevaPassword');
        const confirmarPasswordInput = document.getElementById('confirmarPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const reqLongitud = document.getElementById('reqLongitud');
        const reqMayuscula = document.getElementById('reqMayuscula');
        const reqNumero = document.getElementById('reqNumero');

        function checkPasswordStrength(password) {
            const hasMinLength = password.length >= 4;
            const hasUpperCase = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            reqLongitud.className = hasMinLength ? 'requisito valid' : 'requisito invalid';
            reqMayuscula.className = hasUpperCase ? 'requisito valid' : 'requisito invalid';
            reqNumero.className = hasNumber ? 'requisito valid' : 'requisito invalid';
            
            let score = 0;
            if (hasMinLength) score++;
            if (hasUpperCase) score++;
            if (hasNumber) score++;
            
            let width = 0;
            let text = '';
            let color = '';
            
            if (score === 1 && password.length > 0) {
                width = 33;
                text = 'Debil';
                color = '#ef4444';
            } else if (score === 2) {
                width = 66;
                text = 'Media';
                color = '#f59e0b';
            } else if (score === 3) {
                width = 100;
                text = 'Fuerte';
                color = '#10b981';
            } else {
                width = 0;
                text = 'Escribe...';
                color = '#e5e7eb';
            }
            
            strengthFill.style.width = width + '%';
            strengthFill.style.background = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
            
            return { hasMinLength, hasUpperCase, hasNumber, score };
        }

        nuevaPasswordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
            
            if (confirmarPasswordInput.value.length > 0) {
                if (nuevaPasswordInput.value !== confirmarPasswordInput.value) {
                    confirmarPasswordInput.style.borderColor = '#ef4444';
                } else {
                    confirmarPasswordInput.style.borderColor = '#10b981';
                }
            }
        });

        confirmarPasswordInput.addEventListener('input', (e) => {
            if (nuevaPasswordInput.value !== e.target.value) {
                e.target.style.borderColor = '#ef4444';
            } else {
                e.target.style.borderColor = '#10b981';
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nuevaPassword = nuevaPasswordInput.value;
            const confirmarPassword = confirmarPasswordInput.value;
            const submitBtn = document.getElementById('submitBtn');
            const btnSpan = submitBtn.querySelector('span');

            if (nuevaPassword !== confirmarPassword) {
                mostrarMensaje('Las contraseñas no coinciden', 'error');
                nuevaPasswordInput.focus();
                return;
            }

            if (nuevaPassword.length < 4) {
                mostrarMensaje('La contraseña debe tener al menos 4 caracteres', 'error');
                nuevaPasswordInput.focus();
                return;
            }

            if (nuevaPassword === 'admin123') {
                mostrarMensaje('No puede usar la contraseña por defecto. Por favor, elija una nueva contraseña.', 'error');
                nuevaPasswordInput.focus();
                return;
            }

            mostrarMensaje('Actualizando contraseña...', 'info');
            
            submitBtn.disabled = true;
            btnSpan.innerHTML = '<span class="spinner"></span> Procesando...';

            try {
                const response = await fetch('/api/admin/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: token, 
                        nuevaPassword: nuevaPassword 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    mostrarMensaje('Contraseña restablecida correctamente. Redirigiendo al inicio de sesion...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/PAG.html';
                    }, 3000);
                } else {
                    mostrarMensaje(data.message || 'Error al restablecer la contraseña', 'error');
                    submitBtn.disabled = false;
                    btnSpan.innerHTML = 'Actualizar Contraseña';
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexion con el servidor. Verifica tu conexion a internet.', 'error');
                submitBtn.disabled = false;
                btnSpan.innerHTML = 'Actualizar Contraseña';
            }
        });

        verificarToken();
    </script>
</body>
</html>
