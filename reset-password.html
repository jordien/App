<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Chepita</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4a1d6d 0%, #7b2c8d 50%, #A63C89 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a1d6d;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e8e8f0;
            border-radius: 24px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #A63C89;
        }
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
        }
        .btn-primary:active { transform: scale(0.98); }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 20px;
            font-size: 13px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .password-result {
            background: #f5f0ff;
            border-radius: 20px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
        }
        .password-result strong {
            color: #A63C89;
            font-size: 20px;
            font-family: monospace;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
        .footer a {
            color: #A63C89;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recuperar Contraseña</h1>
        <div class="subtitle">Chepita Sistema de Gestión</div>

        <div class="radio-group">
            <label>
                <input type="radio" name="tipo" value="admin" checked> Administrador
            </label>
            <label>
                <input type="radio" name="tipo" value="trabajador"> Vendedor
            </label>
        </div>
        <div class="input-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com">
        </div>
        <button class="btn btn-primary" id="btnEnviar" onclick="recuperarPassword()">Recuperar Contraseña</button>

        <div id="message" class="message"></div>
        <div id="passwordResult" class="password-result" style="display: none;"></div>

        <div class="footer">
            <a href="/">Volver al inicio</a>
        </div>
    </div>

    <script>
        async function recuperarPassword() {
            const email = document.getElementById('email').value;
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            
            if (!email) {
                mostrarMensaje('Ingresa tu correo electrónico', 'error');
                return;
            }
            
            const btn = document.getElementById('btnEnviar');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Procesando...';
            btn.disabled = true;
            
            try {
                let response;
                if (tipo === 'admin') {
                    response = await fetch('/api/admin/recuperar-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                } else {
                    response = await fetch('/api/trabajadores/recuperar-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                }
                
                const data = await response.json();
                
                if (data.success) {
                    mostrarMensaje('Contraseña restablecida', 'success');
                    document.getElementById('passwordResult').style.display = 'block';
                    document.getElementById('passwordResult').innerHTML = `
                        <strong>Nueva contraseña temporal:</strong><br>
                        <span style="font-size: 24px; letter-spacing: 2px;">${data.nuevaPassword}</span>
                        <br><br>
                        <small style="color: #666;">Usa esta contraseña para iniciar sesión y luego cámbiala desde tu perfil.</small>
                    `;
                    document.getElementById('email').value = '';
                } else {
                    mostrarMensaje(data.message || 'Error al recuperar contraseña', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function mostrarMensaje(texto, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texto;
            msgDiv.className = 'message ' + tipo;
            setTimeout(() => {
                msgDiv.className = 'message';
                msgDiv.textContent = '';
            }, 5000);
        }
    </script>
</body>
</html>
