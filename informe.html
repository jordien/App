<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Dashboard - Tienda Chepita</title>
    <link rel="stylesheet" href="informe.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      .periodo-wrapper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 20px;
      }

      .periodo-selector {
        display: flex;
        gap: 8px;

        padding: 8px;

        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.9),
          rgba(255, 247, 191, 0.35)
        );

        border: 1px solid rgba(231, 200, 91, 0.25);

        border-radius: 50px;

        box-shadow:
          0 10px 25px rgba(0, 0, 0, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .periodo-btn {
        padding: 8px 22px;
        border: none;
        border-radius: 40px;
        background: transparent;
        color: #666;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .periodo-btn.active {
        background: linear-gradient(135deg, #8d679f, #b78bc8);

        color: white;

        box-shadow: 0 8px 18px rgba(141, 103, 159, 0.35);

        transform: translateY(-1px);
      }

      .periodo-btn i {
        font-size: 12px;
      }

      .periodo-btn:hover:not(.active) {
        background: rgba(202, 160, 216, 0.15);
      }

      .fecha-simple {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 247, 191, 0.4)
        );

        border: 1px solid rgba(231, 200, 91, 0.25);

        padding: 12px 20px;

        border-radius: 14px;

        color: #6f4b7d;

        font-weight: 700;

        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .top-card {
        overflow: hidden;

        padding: 0;

        border-radius: 22px;

        margin-bottom: 30px;

        background: transparent;

        border: none;

        box-shadow: none;
      }

      .chart-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 247, 191, 0.18)
        );

        border-radius: 24px;

        border: 1px solid rgba(231, 200, 91, 0.2);

        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);

        transition: 0.35s;
      }

      .chart-card:hover {
        transform: translateY(-5px);

        box-shadow:
          0 25px 50px rgba(0, 0, 0, 0.12),
          0 0 25px rgba(231, 200, 91, 0.15);
      }

      .top-card-header {
        background: linear-gradient(
          135deg,
          #6f4b7d 0%,
          #8d679f 55%,
          #b78bc8 100%
        );

        padding: 18px 24px;

        margin: 0;

        border: none;

        display: flex;
        align-items: center;
        justify-content: space-between;

        position: relative;
      }

      .top-card-header::after {
        content: "";

        position: absolute;

        bottom: 0;
        left: 0;
        right: 0;

        height: 2px;

        background: linear-gradient(
          90deg,
          transparent,
          #fff7bf,
          #e7c85b,
          #fff7bf,
          transparent
        );
      }

      .top-card h3 i {
        color: #e7c85b;
      }
      .top-card h3,
      .chart-title {
        color: #6f4b7d;

        font-weight: 700;
      }
      .top-card h3 {
        color: white;

        font-size: 1.2rem;

        font-weight: 700;

        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-ver-todos {
        background: rgba(141, 103, 159, 0.1);
        border: none;
        padding: 8px 16px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        color: #8d679f;
        transition: all 0.2s;
      }

      .btn-ver-todos:hover {
        background: #8d679f;

        color: white;

        transform: translateY(-2px);
      }

      .top-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 320px;
        overflow-y: auto;
      }

      .top-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        background: rgba(248, 250, 252, 0.9);
        border-radius: 14px;
        transition: all 0.2s;
        border: 1px solid #e2e8f0;
      }

      .top-item:hover {
        background: rgba(231, 200, 91, 0.08);

        transform: translateX(4px);
      }

      .top-rank {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #a63c89;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 12px;
        flex-shrink: 0;
      }

      .top-rank.rank-1 {
        background: linear-gradient(135deg, #ffd700, #ffb347);
        color: #8b6914;
      }
      .top-rank.rank-2 {
        background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
        color: #555;
      }
      .top-rank.rank-3 {
        background: linear-gradient(135deg, #cd7f32, #b87333);
        color: white;
      }

      .top-info {
        flex: 1;
      }

      .top-name {
        font-weight: 600;
        color: #2c3e50;
        font-size: 13px;
      }

      .top-category {
        font-size: 10px;
        color: #888;
        margin-top: 2px;
      }

      .top-value {
        font-weight: 700;
        color: #10b981;
        font-size: 15px;
        text-align: right;
        min-width: 60px;
      }

      .charts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }

      .chart-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);

        border: 1px solid rgba(231, 200, 91, 0.15);

        backdrop-filter: blur(6px);
      }

      .chart-title {
        font-size: 16px;

        padding-bottom: 12px;

        margin-bottom: 18px;

        border-bottom: 2px solid rgba(202, 160, 216, 0.2);
      }

      .chart-wrapper {
        height: 260px;
        position: relative;
      }

      .info-message {
        background: rgba(202, 160, 216, 0.12);
        border-left: 4px solid #8d679f;
        padding: 14px 18px;
        margin-bottom: 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: #6f4b7d;
      }

      .info-message i {
        font-size: 18px;
        color: #8d679f;
      }

      /* ==========================================
   MODALES ESTILO LUXURY DASHBOARD
========================================== */

      .modal-full,
      .modal-mes,
      .modal-anios,
      .modal-dia {
        display: none;

        position: fixed;
        inset: 0;

        z-index: 99999;

        justify-content: center;
        align-items: center;

        backdrop-filter: blur(8px);

        background: rgba(35, 20, 45, 0.55);
      }

      /* CONTENEDOR */

      .modal-full-content,
      .modal-mes-content,
      .modal-anios-content,
      .modal-dia-content {
        overflow: hidden;

        width: 92%;
        max-width: 520px;

        border-radius: 28px;

        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.97),
          rgba(255, 247, 191, 0.55)
        );

        border: 1px solid rgba(231, 200, 91, 0.35);

        backdrop-filter: blur(18px);

        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.25),
          0 0 30px rgba(231, 200, 91, 0.15);

        animation: modalShow 0.3s ease;
      }

      @keyframes modalShow {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* HEADER */

      .modal-full-header,
      .modal-dia-content h3,
      .modal-mes-content h3,
      .modal-anios-content h3 {
        margin: 0;
      }

      .modal-full-header {
        position: relative;

        padding: 18px 24px;

        background: linear-gradient(
          135deg,
          #6f4b7d 0%,
          #8d679f 55%,
          #b78bc8 100%
        );

        color: white;
      }

      .modal-full-header::after {
        content: "";

        position: absolute;

        left: 0;
        right: 0;
        bottom: 0;

        height: 2px;

        background: linear-gradient(
          90deg,
          transparent,
          #fff7bf,
          #e7c85b,
          #fff7bf,
          transparent
        );
      }

      .modal-full-header h2 {
        font-size: 1.15rem;
        font-weight: 700;
      }

      /* CERRAR */

      .modal-close {
        color: white;

        font-size: 28px;

        transition: 0.3s;

        cursor: pointer;
      }

      .modal-close:hover {
        color: #fff7bf;
        transform: rotate(90deg);
      }

      /* BODY */

      .modal-body {
        padding: 24px;
      }

      /* MODALES PEQUEÑOS */

      .modal-dia-content,
      .modal-mes-content,
      .modal-anios-content {
        padding: 0;
      }

      .modal-dia-content > div,
      .modal-mes-content > div,
      .modal-anios-content > div {
        padding: 28px;
      }

      .modal-dia-content h3,
      .modal-mes-content h3,
      .modal-anios-content h3 {
        color: #6f4b7d;

        font-size: 1.2rem;

        font-weight: 700;

        margin-bottom: 20px;
      }

      .modal-full,
      .modal-mes,
      .modal-anios,
      .modal-dia {
        display: none;

        position: fixed;
        inset: 0;

        z-index: 99999;

        justify-content: center;
        align-items: center;

        backdrop-filter: blur(8px);

        background: rgba(35, 20, 45, 0.55);
      }
      .modal-full-content,
      .modal-mes-content,
      .modal-anios-content,
      .modal-dia-content {
        overflow: hidden;

        width: 92%;
        max-width: 520px;

        border-radius: 28px;

        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.97),
          rgba(255, 247, 191, 0.55)
        );

        border: 1px solid rgba(231, 200, 91, 0.35);

        backdrop-filter: blur(18px);

        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.25),
          0 0 30px rgba(231, 200, 91, 0.15);

        animation: modalShow 0.3s ease;
      }

      @keyframes modalShow {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .modal-full-header,
      .modal-dia-content h3,
      .modal-mes-content h3,
      .modal-anios-content h3 {
        margin: 0;
      }

      .modal-full-header {
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        background: linear-gradient(
          135deg,
          #6f4b7d 0%,
          #8d679f 55%,
          #b78bc8 100%
        );
        color: white;
        border-radius: 20px 20px 0 0;
      }

      .modal-full-header::after {
        content: "";

        position: absolute;

        left: 0;
        right: 0;
        bottom: 0;

        height: 2px;

        background: linear-gradient(
          90deg,
          transparent,
          #fff7bf,
          #e7c85b,
          #fff7bf,
          transparent
        );
      }
      .modal-full-header h2 {
        font-size: 1.15rem;
        font-weight: 700;
      }

      .modal-close {
        color: white;

        font-size: 28px;

        transition: 0.3s;

        cursor: pointer;
        font-weight: bold;
      }

      .modal-close:hover {
        color: #fff7bf;
        transform: rotate(90deg);
      }

      .modal-body {
        padding: 24px;
      }

      .selector-dia-panel,
      .selector-mes-panel {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin: 20px 0;
        flex-wrap: wrap;
      }

      .selector-dia-panel input,
      .selector-mes-panel select {
        width: 100%;

        padding: 12px 16px;

        border-radius: 14px;

        border: 1px solid rgba(231, 200, 91, 0.25);

        background: rgba(255, 255, 255, 0.9);

        color: #6f4b7d;

        font-weight: 600;

        outline: none;

        transition: 0.3s;
      }

      .selector-dia-panel input:focus,
      .selector-mes-panel select:focus {
        border-color: #8d679f;

        box-shadow: 0 0 0 4px rgba(141, 103, 159, 0.15);
      }

      .btn-aplicar {
        border: none;

        padding: 12px 26px;

        border-radius: 14px;

        cursor: pointer;

        font-weight: 700;

        color: white;

        background: linear-gradient(135deg, #e7c85b, #d9ae33);

        box-shadow: 0 10px 20px rgba(231, 200, 91, 0.3);

        transition: 0.3s;
      }

      .btn-aplicar:hover {
        transform: translateY(-3px);

        box-shadow: 0 15px 30px rgba(231, 200, 91, 0.4);
      }

      .btn-cancelar {
        background: linear-gradient(135deg, #8d679f, #6f4b7d);

        color: white;
      }
      .btn-cancelar:hover {
        transform: translateY(-3px);
      }

      .lista-anios {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin: 20px 0;
        flex-wrap: wrap;
      }

      .anio-item {
        padding: 12px 24px;

        border-radius: 30px;

        background: rgba(141, 103, 159, 0.08);

        border: 1px solid rgba(141, 103, 159, 0.15);

        color: #6f4b7d;

        font-weight: 700;

        transition: 0.3s;
      }

      .anio-item:hover {
        background: linear-gradient(135deg, #8d679f, #b78bc8);

        color: white;

        transform: translateY(-2px);
      }

      .tabla-completa {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .tabla-completa th {
        background: #f0eaf4;
        color: #a63c89;
        padding: 10px;
        text-align: left;
      }
      .tabla-completa thead th {
        background: rgba(141, 103, 159, 0.08);

        color: #6f4b7d;

        font-weight: 700;

        padding: 14px;
      }

      .tabla-completa tbody tr:hover {
        background: rgba(231, 200, 91, 0.08);
      }

      .tabla-completa td {
        padding: 12px 14px;

        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      .no-data {
        text-align: center;
        padding: 20px;
        color: #999;
        font-size: 13px;
      }

      @media (max-width: 768px) {
        .charts-grid {
          grid-template-columns: 1fr;
        }
        .dashboard-container {
          padding: 15px;
        }
        .periodo-selector {
          flex-wrap: wrap;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="header-marcas">
      <div class="header-marcas-scroll">
        <div class="header-track">
          <img src="imagenes/marcas/logo1.png" />
          <img src="imagenes/marcas/logo2.png" />
          <img src="imagenes/marcas/logo3.png" />
          <img src="imagenes/marcas/logo4.png" />
          <img src="imagenes/marcas/logo5.png" />
          <img src="imagenes/marcas/logo6.png" />

          <img src="imagenes/marcas/logo1.png" />
          <img src="imagenes/marcas/logo2.png" />
          <img src="imagenes/marcas/logo3.png" />
          <img src="imagenes/marcas/logo4.png" />
          <img src="imagenes/marcas/logo5.png" />
          <img src="imagenes/marcas/logo6.png" />
        </div>
      </div>
    </div>
    <div class="dashboard-container">
      <div class="dashboard-header">
        <i class="fas fa-chart-line"></i>
        <h1>Dashboard de Estadísticas</h1>
        <button
          class="back-btn"
          onclick="window.location.href = 'inventario.html'"
        >
          <i class="fas fa-arrow-left"></i> Volver al Inventario
        </button>
      </div>

      <div class="dashboard-content">
        <div class="periodo-wrapper">
          <div class="periodo-selector">
            <button class="periodo-btn active" data-periodo="dia">
              <i class="fas fa-calendar-day"></i> Día
            </button>
            <button class="periodo-btn" data-periodo="semana">
              <i class="fas fa-calendar-week"></i> Semana
            </button>
            <button class="periodo-btn" data-periodo="mes">
              <i class="fas fa-calendar-alt"></i> Mes
            </button>
            <button class="periodo-btn" data-periodo="anio">
              <i class="fas fa-calendar"></i> Año
            </button>
          </div>
          <div class="fecha-simple" id="fechaInfo">
            <i class="fas fa-calendar-alt"></i> <span>Cargando...</span>
          </div>
        </div>

        <div id="infoMessage" class="info-message" style="display: none">
          <i class="fas fa-info-circle"></i>
          <span id="infoMessageText"></span>
        </div>

        <!-- Productos Más Vendidos -->
        <div class="top-card">
          <div class="top-card-header">
            <h3><i class="fas fa-trophy"></i> Productos Más Vendidos</h3>
            <button class="btn-ver-todos" onclick="verTodosProductos()">
              Ver todos
            </button>
          </div>
          <div class="top-list" id="topProductosList">
            <div class="no-data">Cargando...</div>
          </div>
        </div>

        <!-- Gráficos -->
        <div class="charts-grid">
          <div class="chart-card">
            <div class="chart-title">Tendencia de Ventas (Unidades)</div>
            <div class="chart-wrapper"><canvas id="ventasChart"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-title">Unidades por Categoría</div>
            <div class="chart-wrapper">
              <canvas id="categoriasChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODALES -->
    <div id="modalDia" class="modal-dia">
      <div class="modal-dia-content">
        <div style="padding: 20px; text-align: center">
          <h3 style="color: #a63c89">📅 Seleccionar Día</h3>
          <div class="selector-dia-panel">
            <input
              type="date"
              id="selectorFecha"
              min="2024-01-01"
              max=""
              style="width: 100%"
            />
          </div>
          <button class="btn-aplicar" onclick="aplicarDia()">Ver Día</button>
          <button class="btn-aplicar btn-cancelar" onclick="cerrarModalDia()">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <div id="modalMes" class="modal-mes">
      <div class="modal-mes-content">
        <div style="padding: 20px; text-align: center">
          <h3 style="color: #a63c89">📅 Seleccionar Mes</h3>
          <div class="selector-mes-panel">
            <select id="selectorAnio">
              <option value="2024">2024</option>
              <option value="2025">2025</option>
              <option value="2026">2026</option>
            </select>
            <select id="selectorMes">
              <option value="1">Enero</option>
              <option value="2">Febrero</option>
              <option value="3">Marzo</option>
              <option value="4">Abril</option>
              <option value="5">Mayo</option>
              <option value="6">Junio</option>
              <option value="7">Julio</option>
              <option value="8">Agosto</option>
              <option value="9">Septiembre</option>
              <option value="10">Octubre</option>
              <option value="11">Noviembre</option>
              <option value="12">Diciembre</option>
            </select>
          </div>
          <button class="btn-aplicar" onclick="aplicarMes()">Ver Mes</button>
          <button class="btn-aplicar btn-cancelar" onclick="cerrarModalMes()">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <div id="modalAnios" class="modal-anios">
      <div class="modal-anios-content">
        <div style="padding: 20px; text-align: center">
          <h3 style="color: #a63c89">📅 Seleccionar Año</h3>
          <div class="lista-anios" id="listaAnios"></div>
          <button class="btn-aplicar btn-cancelar" onclick="cerrarModalAnios()">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <div id="modalTodosProductos" class="modal-full">
      <div class="modal-full-content">
        <div class="modal-full-header">
          <h2>Todos los Productos Vendidos</h2>
          <span class="modal-close" onclick="cerrarModal('modalTodosProductos')"
            >&times;</span
          >
        </div>
        <div class="modal-body">
          <div
            class="inv-tabla-container"
            style="
              overflow-x: auto;
              border-radius: 12px;
              border: 1px solid #eee;
            "
          >
            <table class="tabla-completa">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Producto</th>
                  <th>Categoría</th>
                  <th>Cantidad</th>
                </tr>
              </thead>
              <tbody id="modalProductosBody">
                <tr>
                  <td colspan="4" class="no-data">Cargando...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let periodoActual = "dia";
      let chartVentas = null;
      let chartCategorias = null;

      const hoy = new Date().toISOString().split("T")[0];

      document.addEventListener("DOMContentLoaded", () => {
        inicializarEventos();
        cargarDiaActual();

        const selectorFecha = document.getElementById("selectorFecha");
        if (selectorFecha) {
          selectorFecha.max = hoy;
          selectorFecha.value = hoy;
        }
      });

      function inicializarEventos() {
        document.querySelectorAll(".periodo-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".periodo-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            periodoActual = btn.dataset.periodo;
            document.getElementById("infoMessage").style.display = "none";

            if (periodoActual === "dia") abrirModalDia();
            else if (periodoActual === "semana") cargarSemanaActual();
            else if (periodoActual === "mes") abrirModalMes();
            else if (periodoActual === "anio") abrirModalAnios();
          });
        });
      }

      function abrirModalDia() {
        const selectorFecha = document.getElementById("selectorFecha");
        selectorFecha.max = hoy;
        selectorFecha.value = hoy;
        document.getElementById("modalDia").style.display = "flex";
      }

      function cerrarModalDia() {
        document.getElementById("modalDia").style.display = "none";
        document
          .querySelectorAll(".periodo-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector('.periodo-btn[data-periodo="dia"]')
          .classList.add("active");
      }

      function aplicarDia() {
        const fecha = document.getElementById("selectorFecha").value;
        if (!fecha) {
          mostrarMensajeTemporal("⚠️ Selecciona una fecha", "#dc3545");
          return;
        }
        if (fecha > hoy) {
          mostrarMensajeTemporal(
            "⚠️ No puedes seleccionar fechas futuras",
            "#dc3545",
          );
          return;
        }
        cerrarModalDia();
        document.getElementById("fechaInfo").innerHTML =
          `<i class="fas fa-calendar-alt"></i> ${formatearFecha(fecha)}`;
        cargarEstadisticasFecha(fecha);
      }

      function abrirModalMes() {
        document.getElementById("modalMes").style.display = "flex";
      }

      function cerrarModalMes() {
        document.getElementById("modalMes").style.display = "none";
        document
          .querySelectorAll(".periodo-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector('.periodo-btn[data-periodo="mes"]')
          .classList.add("active");
      }

      function aplicarMes() {
        const anio = document.getElementById("selectorAnio").value;
        const mes = document.getElementById("selectorMes").value;
        const nombreMes =
          document.getElementById("selectorMes").options[
            document.getElementById("selectorMes").selectedIndex
          ].text;
        cerrarModalMes();
        document.getElementById("fechaInfo").innerHTML =
          `<i class="fas fa-calendar-alt"></i> ${nombreMes} ${anio}`;
        cargarEstadisticasMes(anio, mes);
      }

      function abrirModalAnios() {
        const lista = document.getElementById("listaAnios");
        lista.innerHTML = ["2024", "2025", "2026"]
          .map(
            (anio) =>
              `<div class="anio-item" onclick="cargarAnio(${anio})">${anio}</div>`,
          )
          .join("");
        document.getElementById("modalAnios").style.display = "flex";
      }

      function cerrarModalAnios() {
        document.getElementById("modalAnios").style.display = "none";
        document
          .querySelectorAll(".periodo-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector('.periodo-btn[data-periodo="anio"]')
          .classList.add("active");
      }

      function cargarAnio(anio) {
        cerrarModalAnios();
        document.getElementById("fechaInfo").innerHTML =
          `<i class="fas fa-calendar-alt"></i> Año ${anio}`;
        cargarEstadisticasAnio(anio);
      }

      function mostrarMensajeTemporal(texto, color = "#2196F3") {
        const msgDiv = document.getElementById("infoMessage");
        const msgText = document.getElementById("infoMessageText");
        msgText.innerText = texto;
        msgDiv.style.borderLeftColor = color;
        msgDiv.querySelector("i").style.color = color;
        msgDiv.style.display = "flex";
        setTimeout(() => {
          msgDiv.style.display = "none";
        }, 5000);
      }

      function cargarSemanaActual() {
        const hoyDate = new Date();
        const diaSemana = hoyDate.getDay();
        const lunes = new Date(hoyDate);
        const diasARestar = diaSemana === 0 ? 6 : diaSemana - 1;
        lunes.setDate(hoyDate.getDate() - diasARestar);

        const inicio = lunes.toISOString().split("T")[0];
        const fin = hoy;

        let mensaje = "";
        if (diaSemana === 0) {
          mensaje = "📆 Semana completa (lunes a domingo)";
        } else if (diaSemana === 1) {
          mensaje = "📆 Inicio de semana - Mostrando solo hoy";
        } else {
          mensaje = `📆 Semana en curso - Datos desde el lunes hasta hoy`;
        }

        mostrarMensajeTemporal(mensaje);
        document.getElementById("fechaInfo").innerHTML =
          `<i class="fas fa-calendar-alt"></i> ${formatearFecha(inicio)} - ${formatearFecha(fin)}`;
        cargarEstadisticasRango(inicio, fin);
      }

      function cargarDiaActual() {
        document.getElementById("fechaInfo").innerHTML =
          `<i class="fas fa-calendar-alt"></i> ${formatearFecha(hoy)}`;
        cargarEstadisticasFecha(hoy);
      }

      function formatearFecha(fechaStr) {
        const fecha = new Date(fechaStr);
        return fecha
          .toLocaleDateString("es-ES", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric",
          })
          .replace(/^\w/, (c) => c.toUpperCase());
      }

      function cerrarModal(modalId) {
        document.getElementById(modalId).style.display = "none";
      }

      async function cargarEstadisticasFecha(fecha) {
        try {
          const res = await fetch(
            `/api/estadisticas-ventas-fecha?fecha=${fecha}`,
          );
          const data = await res.json();
          actualizarDashboard(data);
        } catch (err) {
          console.error("Error:", err);
        }
      }

      async function cargarEstadisticasRango(desde, hasta) {
        try {
          const res = await fetch(
            `/api/estadisticas-ventas-rango?desde=${desde}&hasta=${hasta}`,
          );
          const data = await res.json();
          actualizarDashboard(data);
        } catch (err) {
          console.error("Error:", err);
        }
      }

      async function cargarEstadisticasMes(anio, mes) {
        try {
          const res = await fetch(
            `/api/estadisticas-ventas-mes?anio=${anio}&mes=${mes}`,
          );
          const data = await res.json();
          actualizarDashboard(data);
        } catch (err) {
          console.error("Error:", err);
        }
      }

      async function cargarEstadisticasAnio(anio) {
        try {
          const res = await fetch(`/api/estadisticas-ventas-anio?anio=${anio}`);
          const data = await res.json();
          actualizarDashboard(data);
        } catch (err) {
          console.error("Error:", err);
        }
      }

      function actualizarDashboard(data) {
        const topProductos = data.top_productos || [];
        const container = document.getElementById("topProductosList");

        if (topProductos.length > 0) {
          container.innerHTML = topProductos
            .slice(0, 5)
            .map(
              (p, idx) => `
                <div class="top-item">
                    <div class="top-rank rank-${idx + 1}">${idx + 1}</div>
                    <div class="top-info">
                        <div class="top-name">${escapeHtml(p.nombre)}</div>
                        <div class="top-category">${escapeHtml(p.categoria || "Sin categoría")}</div>
                    </div>
                    <div class="top-value">${p.cantidad || 0} und</div>
                </div>
            `,
            )
            .join("");
        } else {
          container.innerHTML = '<div class="no-data">No hay datos</div>';
        }

        renderizarGraficos(data);
      }

      function renderizarGraficos(data) {
        const labels = data.labels_dias || [];
        const valores = (data.data_dias || []).map((v) => v || 0);
        const categorias = data.categorias || [];
        const valoresCat = (data.totales_categorias || []).map((v) => v || 0);

        const ctxVentas = document
          .getElementById("ventasChart")
          .getContext("2d");
        if (chartVentas) chartVentas.destroy();
        chartVentas = new Chart(ctxVentas, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Unidades Vendidas",
                data: valores,
                borderColor: "#A63C89",
                backgroundColor: "rgba(166, 60, 137, 0.1)",
                borderWidth: 3,
                fill: true,
                tension: 0.3,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              tooltip: {
                callbacks: { label: (ctx) => `${ctx.raw.toFixed(0)} unidades` },
              },
            },
          },
        });

        const ctxCat = document
          .getElementById("categoriasChart")
          .getContext("2d");
        if (chartCategorias) chartCategorias.destroy();
        chartCategorias = new Chart(ctxCat, {
          type: "doughnut",
          data: {
            labels: categorias.length ? categorias : ["Sin datos"],
            datasets: [
              {
                data: categorias.length ? valoresCat : [1],
                backgroundColor: [
                  "#A63C89",
                  "#FF6B6B",
                  "#4ECDC4",
                  "#FFD166",
                  "#06D6A0",
                  "#845EC2",
                  "#FF9671",
                ],
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "bottom" },
              tooltip: {
                callbacks: {
                  label: (ctx) =>
                    `${ctx.label}: ${ctx.raw.toFixed(0)} unidades`,
                },
              },
            },
          },
        });
      }

      async function verTodosProductos() {
        try {
          let url = "";
          if (periodoActual === "dia") {
            url = `/api/estadisticas-ventas-fecha?fecha=${hoy}`;
          } else if (periodoActual === "semana") {
            const hoyDate = new Date();
            const diaSemana = hoyDate.getDay();
            const lunes = new Date(hoyDate);
            const diasARestar = diaSemana === 0 ? 6 : diaSemana - 1;
            lunes.setDate(hoyDate.getDate() - diasARestar);
            const inicio = lunes.toISOString().split("T")[0];
            url = `/api/estadisticas-ventas-rango?desde=${inicio}&hasta=${hoy}`;
          } else if (periodoActual === "mes") {
            const anio = new Date().getFullYear();
            const mes = new Date().getMonth() + 1;
            url = `/api/estadisticas-ventas-mes?anio=${anio}&mes=${mes}`;
          } else if (periodoActual === "anio") {
            const anio =
              document
                .getElementById("fechaInfo")
                .innerText.match(/\d{4}/)?.[0] || "2025";
            url = `/api/estadisticas-ventas-anio?anio=${anio}`;
          }

          const res = await fetch(url);
          const data = await res.json();
          const productos =
            data.top_productos_completo || data.top_productos || [];

          const tbody = document.getElementById("modalProductosBody");
          if (productos.length > 0) {
            tbody.innerHTML = productos
              .map(
                (p, idx) => `
                    <tr>
                        <td>${idx + 1}</td>
                        <td><strong>${escapeHtml(p.nombre)}</strong></td>
                        <td>${escapeHtml(p.categoria || "-")}</td>
                        <td>${p.cantidad || 0} und</td>
                    </tr>
                `,
              )
              .join("");
          } else {
            tbody.innerHTML =
              '<tr><td colspan="4" class="no-data">No hay datos</td></tr>';
          }
          document.getElementById("modalTodosProductos").style.display = "flex";
        } catch (err) {
          console.error("Error:", err);
          document.getElementById("modalProductosBody").innerHTML =
            '<tr><td colspan="4" class="no-data">Error cargando datos</td></tr>';
          document.getElementById("modalTodosProductos").style.display = "flex";
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, (m) =>
          m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;",
        );
      }
    </script>
  </body>
</html>
