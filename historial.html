    <style>

      .hc-badge-metodo {

      }
      .btn-admin {
        background-color: #a63c89;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      .btn-admin:hover {
        background-color: #8b2e6e;
      }
      .btn-delete-mode {
        background-color: #dc3545;
      }
      .btn-delete-mode:hover {
        background-color: #c82333;
      }
      .loading {
        text-align: center;
        padding: 20px;

      }
      .hc-error {

      .custom-modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;

      .btn-descargar-pdf {

        cursor: pointer;
      }
      .custom-modal-buttons {
        padding: 20px;

      .custom-modal-btn {

      }
      .hc-detalle-header {
        background-color: #f8f9fa;

      .hc-detalle-table {
        width: 100%;

      .hc-detalle-table th,

  <body>

      <div class="header-marcas-scroll">
        <div class="header-track">
          <img src="imagenes/marcas/logo1.png" />
          <img src="imagenes/marcas/logo2.png" />

          <img src="imagenes/marcas/logo5.png" />
          <img src="imagenes/marcas/logo6.png" />

          <img src="imagenes/marcas/logo1.png" />
          <img src="imagenes/marcas/logo2.png" />
          <img src="imagenes/marcas/logo3.png" />
          <img src="imagenes/marcas/logo4.png" />
          <img src="imagenes/marcas/logo5.png" />
          <img src="imagenes/marcas/logo6.png" />
        </div>
      </div>
    </div>
    <div class="container">
      <div class="top-nav">
        <h2>Historial de Compras</h2>
        <button
          class="btn-volver-top"
          onclick="window.location.href = 'menu_admin.html'"
        >
          Volver al menu
        </button>
      </div>

      <div class="filtros">
        <input
          type="text"
          id="busqueda"
          placeholder="🔍 Buscar factura, cliente o fecha..."
          onkeyup="buscarEnTiempoReal()"
          title="Busca por número de factura, nombre del cliente o fecha"
          maxlength="100"
        />

        <select id="tipoVentaSelect" onchange="filtrarEnTiempoReal()">
          <option value="">Todos los tipos</option>
          <option value="normal">Normal</option>
          <option value="express">Express</option>
        </select>

        <select id="canalSelect" onchange="filtrarEnTiempoReal()">
          <option value="">Todos los canales</option>
        </select>

        <select id="metodoSelect" onchange="filtrarEnTiempoReal()">
          <option value="">Todos los metodos</option>
        </select>

        <button class="btn-admin btn-delete-mode" onclick="limpiarFiltros()">
          Limpiar
        </button>
      </div>

      <div class="table-container">
        <table id="tablaHistorial">
          <thead>
            <tr>
              <th>Factura</th>
              <th>Tipo de Venta</th>
              <th>Cliente</th>
              <th>Fecha</th>
              <th id="canalHeader">Canal</th>
              <th>Metodo de Pago</th>
              <th>Monto Total</th>
              <th>Vendedor</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="resultadosCompras">
            <tr>
              <td colspan="9" class="loading">Cargando compras...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="custom-modal-overlay" id="modalDetalles">
      <div class="custom-modal modal-ancha">
        <div id="detallesContent">
          <div class="loading">Cargando detalles..........</div>
        </div>
      </div>
    </div>

    <script>
      const API = "/api";
      let canales = [];
      let metodos = [];

      // ==================== FUNCIONES DE VALIDACIÓN ====================
      function normalizarTerminoBusqueda(termino) {
        if (!termino || typeof termino !== "string") return "";
        const resultado = termino.trim().toLowerCase();
        console.log("📝 normalizarTerminoBusqueda:", termino, "→", resultado);
        return resultado;
      }

      function validarFactura(numFactura, termino) {
        if (!numFactura || !termino) return false;
        try {
          const facturaStr = numFactura.toString().trim();
          let terminoBusqueda = termino;
          if (terminoBusqueda.startsWith("#")) {
            terminoBusqueda = terminoBusqueda.substring(1);
          }
          const resultado = facturaStr === terminoBusqueda;
          if (resultado) {
            console.log(
              `✓ Factura EXACTA: #${facturaStr} === "${terminoBusqueda}"`,
            );
          }
          return resultado;
        } catch (e) {
          console.error("Error en validarFactura:", e);
          return false;
        }
      }

      function validarCliente(cliente, termino) {
        if (!cliente || !termino) return false;
        try {
          const clienteNormalizado = cliente
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");
          return clienteNormalizado.includes(
            termino.normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
          );
        } catch (e) {
          console.error("Error en validarCliente:", e);
          return false;
        }
      }

      function validarFecha(fecha, termino) {
        if (!fecha || !termino) return false;
        const tieneBarra = termino.includes("/");
        const tieneGuion = termino.includes("-");
        const esAño = /^\d{4}$/.test(termino);
        if (!tieneBarra && !tieneGuion && !esAño) {
          return false;
        }
        try {
          if (fecha.includes(termino)) return true;
          const fechaObj = new Date(fecha);
          const fechaFormatada = fechaObj.toLocaleDateString("es-ES");
          if (fechaFormatada.includes(termino)) return true;
          const mesAño = `${String(fechaObj.getMonth() + 1).padStart(2, "0")}/${fechaObj.getFullYear()}`;
          if (mesAño.includes(termino)) return true;
          const mesAñoGuion = `${fechaObj.getFullYear()}-${String(fechaObj.getMonth() + 1).padStart(2, "0")}`;
          if (mesAñoGuion.includes(termino)) return true;
          const diaMes = `${String(fechaObj.getDate()).padStart(2, "0")}/${String(fechaObj.getMonth() + 1).padStart(2, "0")}`;
          if (diaMes.includes(termino)) return true;
          return false;
        } catch (e) {
          console.error("Error validando fecha:", e);
          return false;
        }
      }

      async function cargarDatos() {
        try {
          console.log("Cargando datos...");
          const [canalesRes, metodosRes] = await Promise.all([
            fetch(`${API}/canales`),
            fetch(`${API}/metodos-pago`),
          ]);

          if (canalesRes.ok) canales = await canalesRes.json();
          if (metodosRes.ok) metodos = await metodosRes.json();

          const canalSelect = document.getElementById("canalSelect");
          const metodoSelect = document.getElementById("metodoSelect");

          canalSelect.innerHTML = '<option value="">Todos los canales</option>';
          if (canales && canales.length) {
            canales.forEach((canal) => {
              canalSelect.innerHTML += `<option value="${canal.Id_Canal}">${escapeHtml(canal.Nombre_Canal)}</option>`;
            });
          }

          metodoSelect.innerHTML =
            '<option value="">Todos los metodos</option>';
          if (metodos && metodos.length) {
            metodos.forEach((metodo) => {
              metodoSelect.innerHTML += `<option value="${metodo.Id_Metodo}">${escapeHtml(metodo.Nombre_Metodo)}</option>`;
            });
          }

          await cargarCompras();
        } catch (error) {
          console.error("Error en cargarDatos:", error);
          document.getElementById("resultadosCompras").innerHTML =
            '<tr><td colspan="9" class="hc-error">Error al cargar los datos</td></tr>';
        }
      }

      async function cargarCompras() {
        const resultadosDiv = document.getElementById("resultadosCompras");
        resultadosDiv.innerHTML =
          '<tr><td colspan="9" class="loading">Cargando compras...</td></tr>';

        try {
          const respuesta = await fetch(`${API}/ventas`);
          if (!respuesta.ok) {
            throw new Error(`Error HTTP: ${respuesta.status}`);
          }

          window.compras = await respuesta.json();
          const compras = window.compras;
          console.log("Ventas recibidas:", compras.length);

          if (!compras || compras.length === 0) {
            resultadosDiv.innerHTML =
              '<tr><td colspan="9" class="hc-no-results">No hay compras registradas</td></tr>';
            return;
          }

          // Agrupar por factura
          const facturas = {};
          compras.forEach((venta) => {
            const numFactura = venta.NumFactura;
            if (!numFactura) return;

            if (!facturas[numFactura]) {
              facturas[numFactura] = {
                NumFactura: numFactura,
                TipoVenta: (() => {
                  const fechaVenta = new Date(venta.Fecha);
                  const fechaExpress = new Date("2026-06-03");
                  if (fechaVenta < fechaExpress) {
                    return "normal";
                  }
                  const tieneCliente =
                    venta.Nombre_Cliente &&
                    venta.Nombre_Cliente.trim() !== "" &&
                    venta.Nombre_Cliente !== "Cliente no registrado";
                  return tieneCliente ? "normal" : "express";
                })(),
                Fecha: venta.Fecha,
                Cliente:
                  venta.Nombre_Cliente === "Cliente no registrado"
                    ? "--"
                    : `${venta.Nombre_Cliente || ""} ${venta.Apellido || ""}`.trim(),
                Canal: venta.Nombre_Canal,
                Metodo: venta.Nombre_Metodo,
                Monto: parseFloat(venta.Monto) || 0,
                Vendedor: venta.Nombre_Vendedor || "No asignado",
                Id_Vendedor: venta.Id_Vendedor,
                productos: [],
              };
            }
            if (venta.Producto) {
              facturas[numFactura].productos.push({
                Nombre: venta.Producto,
                Cantidad: venta.CantidadVendida,
                Precio: parseFloat(venta.PrecioUnitario) || 0,
                Subtotal: parseFloat(venta.Subtotal) || 0,
              });
            }
          });

          // Aplicar filtros
          const busqueda = document
            .getElementById("busqueda")
            .value.toLowerCase();
          const canalFiltro = document.getElementById("canalSelect").value;
          const tipoVentaFiltro =
            document.getElementById("tipoVentaSelect").value;
          const metodoFiltro = document.getElementById("metodoSelect").value;

          let facturasArray = Object.values(facturas);

          if (busqueda) {
            const terminoBusqueda = normalizarTerminoBusqueda(busqueda);
            if (terminoBusqueda.length > 0) {
              facturasArray = facturasArray.filter((f) => {
                const validaFactura = validarFactura(
                  f.NumFactura,
                  terminoBusqueda,
                );
                const validaCliente = validarCliente(
                  f.Cliente,
                  terminoBusqueda,
                );
                const validaFecha = validarFecha(f.Fecha, terminoBusqueda);
                return validaFactura || validaCliente || validaFecha;
              });
            }
          }

          if (canalFiltro) {
            const canalNombre = canales.find(
              (c) => c.Id_Canal == canalFiltro,
            )?.Nombre_Canal;
            facturasArray = facturasArray.filter(
              (f) => f.Canal === canalNombre,
            );
          }

          if (metodoFiltro) {
            const metodoNombre = metodos.find(
              (m) => m.Id_Metodo == metodoFiltro,
            )?.Nombre_Metodo;
            facturasArray = facturasArray.filter(
              (f) => f.Metodo === metodoNombre,
            );
          }

          if (tipoVentaFiltro) {
            facturasArray = facturasArray.filter(
              (f) => f.TipoVenta === tipoVentaFiltro,
            );
          }

          // Filtrar compras sin productos
          facturasArray = facturasArray.filter(
            (f) => f.productos && f.productos.length > 0,
          );

          if (facturasArray.length === 0) {
            const busquedaVal = document
              .getElementById("busqueda")
              .value.trim();
            const tipoVentaVal =
              document.getElementById("tipoVentaSelect").value;
            const canalVal = document.getElementById("canalSelect").value;
            const metodoVal = document.getElementById("metodoSelect").value;

            let mensaje = "No se encontraron compras";
            if (busquedaVal || tipoVentaVal || canalVal || metodoVal) {
              mensaje =
                "⚠️ No se encontraron resultados. Intenta con:<br>• Número de factura completo o parcial<br>• Nombre del cliente (ej: Juan, María)<br>• Fecha (ej: 10/06/2026 o 2026-06)<br>• O limpia los filtros para ver todas";
            }
            resultadosDiv.innerHTML = `<tr><td colspan="9" class="hc-no-results" style="padding: 20px; text-align: center; line-height: 1.6;">${mensaje}</td></tr>`;
            return;
          }

          let html = "";
          facturasArray.forEach((compra) => {
            const fecha = compra.Fecha
              ? new Date(compra.Fecha).toLocaleDateString("es-ES")
              : "Sin fecha";
            const clienteNombre =
              compra.TipoVenta === "express"
                ? "--"
                : compra.Cliente || "Cliente no especificado";
            const vendedor = compra.Vendedor || "No asignado";

            // MOSTRAR CANAL SOLO SI LA VENTA ES NORMAL
            const mostrarCanal = compra.TipoVenta === "normal";
            const canalHtml = mostrarCanal
              ? `<td><span class="hc-badge hc-badge-canal">${escapeHtml(compra.Canal || "N/A")}</span></td>`
              : `<td style="text-align: center; color: #999;">--</td>`;

            html += `<tr>
                    <td>#${escapeHtml(compra.NumFactura)}</td>
                    <td>
                        <span class="${compra.TipoVenta === "express" ? "badge-express" : "badge-normal"}">
                            ${compra.TipoVenta === "express" ? "Express" : "Normal"}
                        </span>
                    </td>
                    <td>${escapeHtml(clienteNombre)}</td>
                    <td>${escapeHtml(fecha)}</td>
                    ${canalHtml}
                    <td><span class="hc-badge hc-badge-metodo">${escapeHtml(compra.Metodo || "N/A")}</span></td>
                    <td>C$ ${compra.Monto.toFixed(2)}</td>
                    <td><span class="vendedor-badge">${escapeHtml(vendedor)}</span></td>
                    <td>
                        <button class="btn-detalles" onclick="verDetalles(${compra.NumFactura})">
                            Ver Detalles
                        </button>
                    </td>
                </tr>`;
          });

          resultadosDiv.innerHTML = html;
        } catch (error) {
          console.error("Error cargando compras:", error);
          resultadosDiv.innerHTML =
            '<tr><td colspan="9" class="hc-error">Error al cargar los datos</td></tr>';
        }
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function buscarEnTiempoReal() {
        clearTimeout(window.busquedaTimeout);
        const inputBusqueda = document.getElementById("busqueda");
        const terminoBusqueda = inputBusqueda.value.trim();

        if (terminoBusqueda.length === 0) {
          inputBusqueda.style.borderColor = "";
          window.busquedaTimeout = setTimeout(() => cargarCompras(), 500);
          return;
        }

        const soloEspacios = /^\s*$/.test(terminoBusqueda);
        if (soloEspacios) {
          inputBusqueda.style.borderColor = "#ff9800";
          return;
        }

        if (terminoBusqueda.length >= 1) {
          inputBusqueda.style.borderColor = "#4CAF50";
        }

        window.busquedaTimeout = setTimeout(() => {
          cargarCompras();
          inputBusqueda.style.borderColor = "";
        }, 500);
      }

      function filtrarEnTiempoReal() {
        cargarCompras();
      }

      function limpiarFiltros() {
        const inputBusqueda = document.getElementById("busqueda");
        const canalSelect = document.getElementById("canalSelect");
        const metodoSelect = document.getElementById("metodoSelect");
        const tipoVentaSelect = document.getElementById("tipoVentaSelect");

        if (inputBusqueda) {
          inputBusqueda.value = "";
          inputBusqueda.style.borderColor = "";
        }
        if (canalSelect) canalSelect.value = "";
        if (metodoSelect) metodoSelect.value = "";
        if (tipoVentaSelect) tipoVentaSelect.value = "";

        if (inputBusqueda) {
          inputBusqueda.style.borderColor = "#4CAF50";
          setTimeout(() => {
            inputBusqueda.style.borderColor = "";
          }, 500);
        }

        cargarCompras();
      }

      async function verDetalles(numFactura) {
        const modal = document.getElementById("modalDetalles");
        const content = document.getElementById("detallesContent");

        modal.style.display = "flex";
        content.innerHTML = '<div class="loading">Cargando detalles...</div>';

        try {
          const compras = window.compras || [];
          const compraFiltrada = compras.filter(
            (c) => c.NumFactura == numFactura,
          );

          if (compraFiltrada.length === 0) {
            content.innerHTML =
              '<div class="hc-error">No se encontraron detalles</div>';
            return;
          }

          const primera = compraFiltrada[0];
          const fecha = primera.Fecha
            ? new Date(primera.Fecha).toLocaleDateString("es-ES")
            : "Sin fecha";
          const fechaVenta = new Date(primera.Fecha);
          const fechaExpress = new Date("2026-06-03");

          const tipoVenta =
            fechaVenta < fechaExpress
              ? "normal"
              : primera.Id_cliente
                ? "normal"
                : "express";
          const cliente =
            tipoVenta === "express"
              ? null
              : `${primera.Nombre_Cliente || ""} ${primera.Apellido || ""}`.trim() ||
                "Cliente no especificado";
          const vendedor = primera.Nombre_Vendedor || "No asignado";
          const canal = primera.Nombre_Canal || "N/A";
          const metodo = primera.Nombre_Metodo || "N/A";
          const montoTotal = parseFloat(primera.Monto) || 0;

          let productosHtml = "";
          const productosValidos = compraFiltrada.filter(
            (p) => p.Producto !== null && p.Producto !== undefined,
          );

          if (productosValidos.length === 0) {
            productosHtml = `<tr><td colspan="4" style="text-align: center; padding: 20px; color: #d32f2f; font-weight: bold;">
                    ⚠️ ERROR: Esta factura no tiene productos registrados en el sistema.
                </td></tr>`;
          } else {
            productosValidos.forEach((p) => {
              productosHtml += `<tr>
                        <td>${escapeHtml(p.Producto)}</td>
                        <td>${p.CantidadVendida || 0}</td>
                        <td>C$ ${parseFloat(p.PrecioUnitario || 0).toFixed(2)}</td>
                        <td>C$ ${parseFloat(p.Subtotal || 0).toFixed(2)}</td>
                    </tr>`;
            });
          }

          let html = `
                <div class="modal-header">
                    <h3>Detalles de la Compra</h3>
                </div>
                <div class="modal-actions">
                    <button class="btn-descargar-pdf" onclick="descargarFacturaPDF(${numFactura})">
                        Descargar Factura PDF
                    </button>
                </div>
                <div class="modal-body">
                    <div class="hc-detalle-header">
                        <p><strong>Factura:</strong> #${primera.NumFactura}</p>
                        ${tipoVenta === "normal" ? `<p><strong>Cliente:</strong> ${escapeHtml(cliente)}</p>` : ""}
                        <p><strong>Fecha:</strong> ${escapeHtml(fecha)}</p>
                        ${tipoVenta === "normal" ? `<p><strong>Canal:</strong> <span class="hc-badge hc-badge-canal">${escapeHtml(canal)}</span></p>` : ""}
                        <p><strong>Metodo de Pago:</strong> <span class="hc-badge hc-badge-metodo">${escapeHtml(metodo)}</span></p>
                        <p><strong>Vendedor:</strong> <span class="vendedor-badge">${escapeHtml(vendedor)}</span></p>
                    </div>

                    <h3 class="hc-subtitle">Productos</h3>
                    <table class="hc-detalle-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Precio Unitario</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${productosHtml}
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="3"><strong>Total</strong></td>
                                <td><span class="hc-total">C$ ${montoTotal.toFixed(2)}</span></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div class="custom-modal-buttons">
                    <button class="custom-modal-btn cancel" onclick="cerrarModal()">Cerrar</button>
                </div>
            `;
          content.innerHTML = html;
        } catch (error) {
          console.error("Error:", error);
          content.innerHTML =
            '<div class="hc-error">Error al cargar detalles</div>';
        }
      }

      async function descargarFacturaPDF(numFactura) {
        try {
          const compras = window.compras || [];
          const compraFiltrada = compras.filter(
            (c) => c.NumFactura == numFactura,
          );

          if (compraFiltrada.length === 0) {
            alert("No se encontraron datos para generar la factura");
            return;
          }

          const primera = compraFiltrada[0];
          const fecha = primera.Fecha
            ? new Date(primera.Fecha).toLocaleDateString("es-ES")
            : "Sin fecha";
          const horaActual = new Date().toLocaleTimeString("es-ES");
          const cliente =
            `${primera.Nombre_Cliente || ""} ${primera.Apellido || ""}`.trim() ||
            "Cliente no especificado";
          const esVentaExpress =
            !primera.Nombre_Cliente ||
            primera.Nombre_Cliente === "Cliente no registrado";
          const vendedor = primera.Nombre_Vendedor || "No asignado";
          const canal = primera.Nombre_Canal || "N/A";
          const metodo = primera.Nombre_Metodo || "N/A";
          const montoTotal = parseFloat(primera.Monto) || 0;

          const productosValidos = compraFiltrada.filter(
            (p) => p.Producto !== null && p.Producto !== undefined,
          );

          if (productosValidos.length === 0) {
            alert(
              "❌ Error: Esta factura no tiene productos registrados en el sistema. No se puede generar el PDF.",
            );
            return;
          }

          let productosHtml = "";
          productosValidos.forEach((p) => {
            productosHtml += `<tr>
                    <td style="padding: 8px 10px; border-bottom: 1px solid #e2e8f0;">${escapeHtml(p.Producto)}</td>
                    <td style="padding: 8px 10px; border-bottom: 1px solid #e2e8f0; text-align: center;">${p.CantidadVendida || 0}</td>
                    <td style="padding: 8px 10px; border-bottom: 1px solid #e2e8f0; text-align: right;">C$ ${parseFloat(p.PrecioUnitario || 0).toFixed(2)}</td>
                    <td style="padding: 8px 10px; border-bottom: 1px solid #e2e8f0; text-align: right;">C$ ${parseFloat(p.Subtotal || 0).toFixed(2)}</td>
                </tr>`;
          });

          const facturaHTML = `
                <div class="factura-pdf" id="facturaParaPDF">
                    <div class="factura-header">
                        <div class="factura-logo" style="text-align: center;">
                            <img src="imagenes/LOGOCHEPITA.png" alt="Variedades Chepita" style="width: 120px; height: 120px; object-fit: contain;">
                        </div>
                        <div class="factura-titulo">Variedades Chepita</div>
                        <div class="factura-subtitulo">RUC: 1234567890001</div>
                        <div class="factura-subtitulo">Mercado Roberto Huembe - Calle Principal de los Comedores Populares Módulo E -353</div>
                        <div class="factura-subtitulo">Managua, Nicaragua</div>
                        <div class="factura-subtitulo">Tel: +505 8983 7034</div>
                    </div>
                    
                    <div class="factura-info">
                        <div>
                            <p><strong>Factura N°:</strong> ${primera.NumFactura}</p>
                            <p><strong>Fecha:</strong> ${fecha}</p>
                            <p><strong>Vendedor:</strong> ${escapeHtml(vendedor)}</p>
                            <p><strong>Hora:</strong> ${horaActual}</p>
                        </div>
                        <div>
                            ${!esVentaExpress ? `<p><strong>Cliente:</strong> ${escapeHtml(cliente)}</p>` : ""}
                            ${!esVentaExpress ? `<p><strong>Canal:</strong> ${escapeHtml(canal)}</p>` : ""}
                            <p><strong>Metodo de Pago:</strong> ${escapeHtml(metodo)}</p>
                        </div>
                    </div>
                    
                    <table class="factura-tabla">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Precio Unitario</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${productosHtml}
                        </tbody>
                    </table>
                    
                    <div class="factura-total">
                        <p>Total a Pagar: C$ ${montoTotal.toFixed(2)}</p>
                    </div>
                    
                    <div class="factura-footer">
                        <p>Gracias por su compra</p>
                        <p>Este documento es una factura comercial valida</p>
                        <p>Variedades Chepita - Calidad y Confianza</p>
                    </div>
                </div>
            `;

          const ventana = window.open("", "_blank");
          ventana.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Factura #${numFactura} - Variedades Chepita</title>
                    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
                    <style>
                        * {
                            margin: 0;
                            padding: 0;
                            box-sizing: border-box;
                        }
                        body {
                            font-family: 'Poppins', 'Arial', sans-serif;
                            background: white;
                            padding: 40px 20px;
                            display: flex;
                            justify-content: center;
                        }
                        .factura-pdf {
                            max-width: 800px;
                            width: 100%;
                            margin: 0 auto;
                            background: white;
                            padding: 30px;
                            border-radius: 0;
                            box-shadow: 0 0 20px rgba(0,0,0,0.1);
                        }
                        .factura-header {
                            text-align: center;
                            border-bottom: 2px solid #A63C89;
                            padding-bottom: 20px;
                            margin-bottom: 20px;
                        }
                        .factura-titulo {
  margin: 0;
  color: white;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 2;
                        }
                        .factura-subtitulo {
                            font-size: 11px;
                            color: #666;
                            margin: 2px 0;
                        }
                        .factura-info {
                            display: flex;
                            justify-content: space-between;
                            margin-bottom: 25px;
                            padding: 15px;
                            background: #f8f9fa;
                            border-radius: 8px;
                        }
                        .factura-info p {
                            margin: 5px 0;
                            font-size: 11px;
                        }
                        .factura-info strong {
                            color: #A63C89;
                        }
                        .factura-tabla {
                            width: 100%;
                            border-collapse: collapse;
                            margin-bottom: 20px;
                        }
                        .factura-tabla th {
                            background: #f1f5f9;
                            padding: 10px;
                            text-align: left;
                            font-size: 12px;
                            font-weight: 600;
                            border-bottom: 2px solid #e2e8f0;
                        }
                        .factura-tabla td {
                            padding: 8px 10px;
                            border-bottom: 1px solid #e2e8f0;
                            font-size: 11px;
                        }
                        .factura-total {
                            text-align: right;
                            padding-top: 15px;
                            border-top: 2px solid #A63C89;
                            margin-top: 15px;
                        }
                        .factura-total p {
                            font-size: 16px;
                            font-weight: 700;
                            color: #A63C89;
                        }
                        .factura-footer {
                            text-align: center;
                            margin-top: 30px;
                            padding-top: 15px;
                            border-top: 1px solid #ddd;
                            font-size: 9px;
                            color: #999;
                        }
                        @media print {
                            body {
                                padding: 0;
                                margin: 0;
                            }
                            .factura-pdf {
                                box-shadow: none;
                                padding: 15px;
                            }
                            .no-print {
                                display: none;
                            }
                        }
                    </style>
                </head>
                <body>
                    ${facturaHTML}
                    <div style="text-align: center; margin-top: 20px;" class="no-print">
                        <button onclick="window.print()" style="padding: 10px 20px; background: #A63C89; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif; margin: 5px;">Imprimir Factura</button>
                        <button onclick="window.close()" style="padding: 10px 20px; background: #666; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif; margin: 5px;">Cerrar</button>
                    </div>
                </body>
                </html>
            `);
          ventana.document.close();
        } catch (error) {
          console.error("Error generando factura:", error);
          alert("Error al generar la factura");
        }
      }

      function cerrarModal() {
        document.getElementById("modalDetalles").style.display = "none";
      }

      window.onclick = function (event) {
        const modal = document.getElementById("modalDetalles");
        if (event.target === modal) cerrarModal();
      };

      document.addEventListener("DOMContentLoaded", cargarDatos);
    </script>
  </body>
</html>
