<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>Chepita</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #4a1d6d 0%, #7b2c8d 50%, #A63C89 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .portal-card {
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }
        h1 { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #A63C89, #4a1d6d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px; }
        .btn-portal {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 16px 0;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }
        .btn-admin { background: linear-gradient(135deg, #A63C89, #4a1d6d); color: white; box-shadow: 0 4px 15px rgba(166, 60, 137, 0.3); }
        .btn-vendedor { background: #f0f0f0; color: #4a1d6d; border: 2px solid #A63C89; }
        .btn-portal:active { transform: scale(0.98); }
        .footer { margin-top: 24px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="portal-card">
        <h1>🏪 Chepita</h1>
        <p style="margin-bottom: 24px; color: #666;">Sistema de Gestión Comercial</p>
        
        <a href="/admin_app.html" class="btn-portal btn-admin">👑 Administrador</a>
        <a href="/vendedor_app.html" class="btn-portal btn-vendedor">👤 Vendedor</a>
        
        <div class="footer">Selecciona tu rol</div>
    </div>
</body>
</html>
