<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>Chepita - Portal de Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4a1d6d 0%, #7b2c8d 50%, #A63C89 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Elementos decorativos de fondo */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 0;
        }

        .c1 {
            width: 400px;
            height: 400px;
            top: -150px;
            right: -100px;
        }

        .c2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -150px;
        }

        .c3 {
            width: 250px;
            height: 250px;
            top: 50%;
            left: 20%;
        }

        .c4 {
            width: 300px;
            height: 300px;
            bottom: 10%;
            right: 10%;
        }

        .sparkle {
            position: fixed;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        .sparkle1 {
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }

        .sparkle2 {
            top: 70%;
            right: 15%;
            animation-delay: 2s;
        }

        .sparkle3 {
            top: 30%;
            right: 25%;
            animation-delay: 4s;
        }

        .sparkle4 {
            bottom: 20%;
            left: 20%;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 8s ease-in-out infinite;
        }

        .p1 {
            top: 20%;
            left: 15%;
            animation-delay: 0s;
        }

        .p2 {
            top: 60%;
            right: 20%;
            animation-delay: 1s;
        }

        .p3 {
            top: 40%;
            left: 30%;
            animation-delay: 2s;
        }

        .p4 {
            bottom: 30%;
            right: 30%;
            animation-delay: 3s;
        }

        .p5 {
            top: 80%;
            left: 10%;
            animation-delay: 4s;
        }

        .p6 {
            top: 10%;
            right: 40%;
            animation-delay: 5s;
        }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(0px);
                opacity: 0;
            }
            50% {
                transform: translateY(-30px);
                opacity: 1;
            }
        }

        /* Layout principal */
        .main-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        /* Encabezado */
        .login-header {
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #A63C89 0%, #4a1d6d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: #2d1b3d;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #7a6b8a;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .fecha-login {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f8f4ff 0%, #f0eafa 100%);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #A63C89;
            font-weight: 500;
        }

        .fecha-login i {
            color: #A63C89;
        }

        /* Botones de rol */
        .rol-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 0;
            flex-wrap: wrap;
        }

        .btn-rol {
            flex: 1;
            padding: 18px 24px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-admin {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
            box-shadow: 0 4px 15px rgba(166, 60, 137, 0.4);
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(166, 60, 137, 0.5);
        }

        .btn-vendedor {
            background: white;
            color: #4a1d6d;
            border: 2px solid #A63C89;
        }

        .btn-vendedor:hover {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        .btn-rol:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #bbb;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .portal-card {
                padding: 32px 24px;
            }

            .login-header h1 {
                font-size: 36px;
            }

            .login-header h2 {
                font-size: 24px;
            }

            .btn-rol {
                padding: 14px 20px;
                font-size: 16px;
            }

            .rol-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Elementos decorativos -->
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
    <div class="bg-circle c4"></div>
    <div class="sparkle sparkle1">✦</div>
    <div class="sparkle sparkle2">✦</div>
    <div class="sparkle sparkle3">✦</div>
    <div class="sparkle sparkle4">✦</div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>

    <div class="main-layout">
        <div class="portal-card">
            <div class="login-header">
                <h1>🏪 Chepita</h1>
                <h2>✨ Bienvenido ✨</h2>
                <p>Sistema de Gestión de Variedades Chepita</p>
                <div class="fecha-login">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span id="fecha"></span>
                    <span>·</span>
                    <i class="fa-regular fa-clock"></i>
                    <span id="hora"></span>
                </div>
            </div>

            <div class="rol-buttons">
                <a href="/admin_app.html" class="btn-rol btn-admin">
                    👑 Administrador
                </a>
                <a href="/vendedor_app.html" class="btn-rol btn-vendedor">
                    👤 Vendedor
                </a>
            </div>

            <div class="footer">
                <i class="fa-regular fa-copyright"></i> 2024 Chepita - Sistema de Gestión Comercial
            </div>
        </div>
    </div>

    <script>
        // Función para mostrar fecha y hora actual
        function actualizarFechaHora() {
            const ahora = new Date();
            const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
            const fechaStr = ahora.toLocaleDateString('es-ES', opcionesFecha);
            const horaStr = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('fecha').textContent = fechaStr;
            document.getElementById('hora').textContent = horaStr;
        }

        actualizarFechaHora();
        setInterval(actualizarFechaHora, 60000);

        // Efecto hover en tarjeta
        const portalCard = document.querySelector('.portal-card');
        if (portalCard) {
            portalCard.addEventListener('mouseenter', () => {
                portalCard.style.transition = 'transform 0.3s ease, box-shadow 0.3s ease';
            });
        }
    </script>
</body>
</html>
