<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chepita Vendedor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4a1d6d 0%, #7b2c8d 50%, #A63C89 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 48px;
            padding: 28px 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a1d6d;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e8e8f0;
            border-radius: 24px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #A63C89;
        }
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary {
            background: #f0f0f0;
            color: #4a1d6d;
        }
        .suggestions {
            background: white;
            border: 2px solid #e8e8f0;
            border-radius: 20px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 5px;
            display: none;
        }
        .suggestion-item {
            padding: 12px 18px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .suggestion-item:hover {
            background: #f5f0ff;
        }
        .suggestion-item .nombre {
            font-weight: 600;
            color: #4a1d6d;
        }
        .suggestion-item .email {
            font-size: 12px;
            color: #999;
        }
        .vendedor-card {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        .vendedor-nombre { font-size: 22px; font-weight: 800; }
        .qr-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(166,60,137,0.2);
        }
        .qr-wrapper { background: white; padding: 20px; border-radius: 28px; display: inline-block; }
        .timer-card {
            background: #f0f9ff;
            border-radius: 24px;
            padding: 14px;
            text-align: center;
            margin: 16px 0;
        }
        .timer-time { font-size: 28px; font-weight: 800; font-family: monospace; }
        .footer-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .footer-buttons .btn { flex: 1; margin: 0; }
        .instrucciones {
            background: linear-gradient(135deg, #f5f0ff, #faf5ff);
            border-radius: 28px;
            padding: 20px;
            margin-top: 24px;
            border-left: 4px solid #A63C89;
        }
        .step-number {
            display: inline-flex;
            width: 24px;
            height: 24px;
            background: #A63C89;
            color: white;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .hidden { display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease-out; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 Chepita Vendedor</h1>
            <p>Sistema de Ventas con QR</p>
        </div>

        <!-- PANTALLA DE LOGIN CON BUSCADOR -->
        <div id="loginSection" class="animate-in">
            <div class="input-group">
                <label>🔍 Busca tu nombre (ej: jordy, maria, rosa)</label>
                <input type="text" id="searchInput" placeholder="Escribe tu nombre..." autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <div id="passwordSection" class="hidden">
                <div class="input-group">
                    <label>🔐 Contraseña</label>
                    <input type="password" id="passwordInput" placeholder="Ingresa tu contraseña">
                </div>
                <button class="btn btn-primary" onclick="iniciarSesion()">Iniciar Sesión</button>
            </div>
            <div id="selectedUserInfo" class="hidden" style="background:#f5f0ff; padding:12px; border-radius:20px; margin-top:10px; text-align:center;">
                <span id="selectedUserName"></span>
                <button onclick="clearSelection()" style="background:none; border:none; color:#A63C89; margin-left:10px;">✖</button>
            </div>
        </div>

        <!-- PANTALLA PRINCIPAL (QR) -->
        <div id="appSection" class="hidden animate-in">
            <div class="vendedor-card">
                <div class="vendedor-nombre" id="vendedorNombre">Cargando...</div>
                <div style="font-size:13px; opacity:0.9;" id="vendedorId"></div>
            </div>
            <div class="qr-card" id="qrContainer" style="display: none;">
                <div class="qr-wrapper"><div id="qrcode"></div></div>
                <div class="codigo-texto" id="codigoTexto" style="font-family:monospace; font-size:12px; background:#f5f5f5; padding:10px; border-radius:20px; margin-top:16px;"></div>
            </div>
            <div class="timer-card" id="tiempoInfo" style="display: none;">
                <div class="timer-text">Válido por</div>
                <div class="timer-time" id="timerTime">00:00</div>
            </div>
            <button class="btn btn-primary" onclick="generarNuevoQR()" id="btnGenerar">📱 Generar nuevo QR</button>
            <div class="footer-buttons">
                <button class="btn btn-secondary" onclick="enviarQREmail()">📧 Enviar por Email</button>
                <button class="btn btn-secondary" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
            </div>
            <div class="instrucciones">
                <h4>📌 Cómo usar este QR</h4>
                <p><span class="step-number">1</span> Muestra este QR en tu celular</p>
                <p><span class="step-number">2</span> El cliente lo acerca a la cámara de la caja</p>
                <p><span class="step-number">3</span> La venta se asigna automáticamente a ti</p>
                <p style="margin-top:12px; font-size:12px; color:#A63C89;">El QR se renueva cada 60 minutos por seguridad</p>
            </div>
        </div>
    </div>

    <script>
        let token = null;
        let vendedor = null;
        let qrActual = null;
        let intervalo = null;
        let trabajadores = [];
        let vendedorSeleccionado = null;

        // Cargar lista de trabajadores al inicio
        async function cargarTrabajadores() {
            try {
                const response = await fetch('/api/trabajadores/activos');
                const data = await response.json();
                trabajadores = data;
                console.log('📋 Trabajadores cargados:', trabajadores.length);
            } catch (error) {
                console.error('Error cargando trabajadores:', error);
            }
        }

        // Buscador con autocompletado
        const searchInput = document.getElementById('searchInput');
        const suggestionsDiv = document.getElementById('suggestions');
        const passwordSection = document.getElementById('passwordSection');
        const selectedUserInfo = document.getElementById('selectedUserInfo');
        const selectedUserName = document.getElementById('selectedUserName');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            if (query.length < 1) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            const filtered = trabajadores.filter(t => 
                t.NombreCompleto.toLowerCase().includes(query) ||
                (t.nombre_usuario && t.nombre_usuario.toLowerCase().includes(query))
            );
            
            if (filtered.length > 0) {
                suggestionsDiv.innerHTML = filtered.map(t => `
                    <div class="suggestion-item" onclick="seleccionarVendedor(${t.Id_Trabajador}, '${t.NombreCompleto.replace(/'/g, "\\'")}', '${t.nombre_usuario || ''}')">
                        <div class="nombre">👤 ${t.NombreCompleto}</div>
                        <div class="email">📧 ${t.email || 'Sin email'} | 👤 ${t.nombre_usuario || 'Sin usuario'}</div>
                    </div>
                `).join('');
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        });

        function seleccionarVendedor(id, nombre, usuario) {
            vendedorSeleccionado = { id, nombre, usuario };
            searchInput.value = nombre;
            suggestionsDiv.style.display = 'none';
            selectedUserInfo.classList.remove('hidden');
            selectedUserName.innerHTML = `✅ Seleccionado: ${nombre}`;
            passwordSection.classList.remove('hidden');
        }

        function clearSelection() {
            vendedorSeleccionado = null;
            searchInput.value = '';
            selectedUserInfo.classList.add('hidden');
            passwordSection.classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }

        async function iniciarSesion() {
            if (!vendedorSeleccionado) {
                alert('Primero selecciona tu nombre de la lista');
                return;
            }
            
            const password = document.getElementById('passwordInput').value;
            if (!password) {
                alert('Ingresa tu contraseña');
                return;
            }
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Verificando...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/trabajadores/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nombre_usuario: vendedorSeleccionado.usuario || vendedorSeleccionado.nombre, 
                        password: password 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    token = data.token;
                    vendedor = data.trabajador;
                    localStorage.setItem('token_vendedor', token);
                    localStorage.setItem('vendedor', JSON.stringify(vendedor));
                    mostrarApp();
                    cargarQRActivo();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error de conexión: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function mostrarApp() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('vendedorNombre').innerHTML = vendedor.nombre;
            document.getElementById('vendedorId').innerHTML = 'ID: ' + vendedor.id + ' | ' + (vendedor.email || 'Sin email');
        }

        async function cargarQRActivo() {
            try {
                const response = await fetch(`/api/vendedor/qr-activo/${vendedor.id}`);
                const data = await response.json();
                if (data.tiene_qr_activo && new Date(data.expira) > new Date()) {
                    mostrarQR(data.codigo, data.expira);
                } else {
                    await generarNuevoQR();
                }
            } catch (error) {
                console.error('Error cargando QR:', error);
            }
        }

        async function generarNuevoQR() {
            const btn = document.getElementById('btnGenerar');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Generando...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/vendedor/generar-qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id_vendedor: vendedor.id, duracion_minutos: 60 })
                });
                const data = await response.json();
                if (data.success) {
                    mostrarQR(data.codigo, data.expira);
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error generando QR: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function mostrarQR(codigo, expira) {
            qrActual = codigo;
            document.getElementById('qrContainer').style.display = 'block';
            document.getElementById('tiempoInfo').style.display = 'block';
            document.getElementById('codigoTexto').textContent = codigo;
            
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: codigo,
                width: 220,
                height: 220,
                colorDark: "#A63C89",
                colorLight: "#ffffff"
            });
            
            actualizarTiempo(expira);
            if (intervalo) clearInterval(intervalo);
            intervalo = setInterval(() => actualizarTiempo(expira), 1000);
        }

        function actualizarTiempo(expira) {
            const diff = new Date(expira) - new Date();
            const timerDiv = document.getElementById('tiempoInfo');
            const timeSpan = document.getElementById('timerTime');
            
            if (diff <= 0) {
                timerDiv.className = 'timer-card timer-expired';
                timeSpan.innerHTML = 'EXPIRADO';
                document.getElementById('qrContainer').style.opacity = '0.5';
            } else {
                const minutos = Math.floor(diff / 60000);
                const segundos = Math.floor((diff % 60000) / 1000);
                timerDiv.className = 'timer-card timer-active';
                timeSpan.innerHTML = minutos.toString().padStart(2, '0') + ':' + segundos.toString().padStart(2, '0');
                document.getElementById('qrContainer').style.opacity = '1';
            }
        }

        async function enviarQREmail() {
            if (!vendedor.email) {
                alert('Tu cuenta no tiene correo registrado');
                return;
            }
            if (!qrActual) {
                alert('Primero genera un QR');
                return;
            }
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Enviando...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/vendedor/enviar-qr-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: vendedor.email,
                        codigo: qrActual,
                        nombre_vendedor: vendedor.nombre
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert('✅ QR enviado a tu correo');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token_vendedor');
            localStorage.removeItem('vendedor');
            token = null;
            vendedor = null;
            if (intervalo) clearInterval(intervalo);
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('appSection').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
            clearSelection();
        }

        // Inicializar
        cargarTrabajadores();
        
        const tokenGuardado = localStorage.getItem('token_vendedor');
        const vendedorGuardado = localStorage.getItem('vendedor');
        if (tokenGuardado && vendedorGuardado) {
            token = tokenGuardado;
            vendedor = JSON.parse(vendedorGuardado);
            mostrarApp();
            cargarQRActivo();
        }
    </script>
</body>
</html>
