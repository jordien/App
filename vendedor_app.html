<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chepita Vendedor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4a1d6d 0%, #7b2c8d 50%, #A63C89 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 48px;
            padding: 28px 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: #f0f0f0;
            border-radius: 30px;
            padding: 5px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: none;
            background: transparent;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }
        .tab.active {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
            box-shadow: 0 2px 8px rgba(166,60,137,0.3);
        }
        .panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .panel.active-panel {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a1d6d;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e8e8f0;
            border-radius: 24px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #A63C89;
        }
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary {
            background: #f0f0f0;
            color: #4a1d6d;
        }
        .btn-link {
            background: none;
            color: #A63C89;
            font-size: 14px;
            margin-top: 10px;
        }
        .suggestions {
            background: white;
            border: 2px solid #e8e8f0;
            border-radius: 20px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 5px;
            display: none;
        }
        .suggestion-item {
            padding: 12px 18px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestion-item:hover {
            background: #f5f0ff;
        }
        .suggestion-item .nombre {
            font-weight: 600;
            color: #4a1d6d;
        }
        .suggestion-item .email {
            font-size: 12px;
            color: #999;
        }
        .vendedor-card {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        .vendedor-nombre { font-size: 22px; font-weight: 800; }
        .qr-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(166,60,137,0.2);
        }
        .qr-wrapper { background: white; padding: 20px; border-radius: 28px; display: inline-block; }
        .timer-card {
            background: #f0f9ff;
            border-radius: 24px;
            padding: 14px;
            text-align: center;
            margin: 16px 0;
        }
        .timer-time { font-size: 28px; font-weight: 800; font-family: monospace; }
        .footer-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .footer-buttons .btn { flex: 1; margin: 0; }
        .instrucciones {
            background: linear-gradient(135deg, #f5f0ff, #faf5ff);
            border-radius: 28px;
            padding: 20px;
            margin-top: 24px;
            border-left: 4px solid #A63C89;
        }
        .step-number {
            display: inline-flex;
            width: 24px;
            height: 24px;
            background: #A63C89;
            color: white;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .hidden { display: none; }
        .modal-message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-message-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            max-width: 300px;
            text-align: center;
        }
        .modal-message-content p {
            margin-bottom: 20px;
            color: #333;
        }
        .modal-message-content button {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            max-width: 350px;
            width: 90%;
        }
        .modal-content h3 {
            color: #4a1d6d;
            margin-bottom: 20px;
        }
        /* Estilos para la tarjeta de puntos */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #f8f9ff, white);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(166,60,137,0.2);
        }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #A63C89;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .puntaje-card {
            background: linear-gradient(135deg, #A63C89, #4a1d6d);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .puntaje-valor {
            font-size: 48px;
            font-weight: 800;
        }
        .premio-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 10px;
        }
        .premio-oro { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
        .premio-plata { background: linear-gradient(135deg, #f0fdf4, #dcfce7); color: #166534; }
        .premio-bronce { background: linear-gradient(135deg, #fefce8, #fef08a); color: #854d0e; }
        .premio-cobre { background: linear-gradient(135deg, #fff7ed, #fed7aa); color: #9a3412; }
        .premio-vale { background: linear-gradient(135deg, #e0f2fe, #bae6fd); color: #0369a1; }
        .premio-nada { background: #f1f5f9; color: #64748b; }
        .loading-puntos {
            text-align: center;
            padding: 40px;
            color: #A63C89;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chepita Vendedor</h1>
            <p>Sistema de Ventas</p>
        </div>

        <!-- Login Section -->
        <div id="loginSection">
            <div class="input-group">
                <label>Busca tu nombre</label>
                <input type="text" id="searchInput" placeholder="Escribe tu nombre..." autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <div id="passwordSection" class="hidden">
                <div class="input-group">
                    <label>Contrasena</label>
                    <input type="password" id="passwordInput" placeholder="Ingresa tu contrasena">
                </div>
                <button class="btn btn-primary" onclick="iniciarSesion()">Iniciar Sesion</button>
                <button class="btn btn-link" onclick="mostrarRecuperacion()">Olvidaste tu contrasena?</button>
            </div>
            <div id="selectedUserInfo" class="hidden" style="background:#f5f0ff; padding:12px; border-radius:20px; margin-top:10px; text-align:center;">
                <span id="selectedUserName"></span>
                <button onclick="clearSelection()" style="background:none; border:none; color:#A63C89; margin-left:10px;">X</button>
            </div>
        </div>

        <!-- App Section with Tabs -->
        <div id="appSection" class="hidden">
            <!-- Vendedor Info -->
            <div class="vendedor-card">
                <div class="vendedor-nombre" id="vendedorNombre">Cargando...</div>
                <div style="font-size:13px; opacity:0.9;" id="vendedorId"></div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-tab="qr" onclick="cambiarTab('qr')">Generar QR</button>
                <button class="tab" data-tab="puntos" onclick="cambiarTab('puntos')">Mis Puntos</button>
            </div>

            <!-- Panel QR -->
            <div id="panelQR" class="panel active-panel">
                <div class="qr-card" id="qrContainer" style="display: none;">
                    <div class="qr-wrapper"><div id="qrcode"></div></div>
                    <div class="codigo-texto" id="codigoTexto" style="font-family:monospace; font-size:12px; background:#f5f5f5; padding:10px; border-radius:20px; margin-top:16px;"></div>
                </div>
                <div class="timer-card" id="tiempoInfo" style="display: none;">
                    <div class="timer-text">Valido por</div>
                    <div class="timer-time" id="timerTime">00:00</div>
                </div>
                <button class="btn btn-primary" onclick="generarNuevoQR()" id="btnGenerar">Generar nuevo QR</button>
                <div class="footer-buttons">
                    <button class="btn btn-secondary" onclick="enviarQREmail()">Enviar por Email</button>
                </div>
                <div class="instrucciones">
                    <h4>Como usar este QR</h4>
                    <p><span class="step-number">1</span> Muestra este QR en tu celular</p>
                    <p><span class="step-number">2</span> El cliente lo acerca a la camara de la caja</p>
                    <p><span class="step-number">3</span> La venta se asigna automaticamente a ti</p>
                    <p style="margin-top:12px; font-size:12px; color:#A63C89;">El QR se renueva cada 60 minutos por seguridad</p>
                </div>
            </div>

            <!-- Panel Mis Puntos -->
            <div id="panelPuntos" class="panel">
                <div id="puntosContent">
                    <div class="loading-puntos">
                        <i class="fas fa-spinner fa-spin"></i> Cargando tus estadisticas...
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="cargarMisPuntos()" style="margin-top: 15px;">
                    Actualizar datos
                </button>
            </div>

            <!-- Boton cerrar sesion -->
            <div class="footer-buttons" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="cerrarSesion()">Cerrar sesion</button>
            </div>
        </div>
    </div>

    <script>
        let token = null;
        let vendedor = null;
        let qrActual = null;
        let intervalo = null;
        let trabajadores = [];
        let vendedorSeleccionado = null;

        function obtenerPremio(puntaje) {
            if (puntaje >= 50) return { texto: "C$ 1,000 + Diploma", clase: "premio-oro" };
            if (puntaje >= 40) return { texto: "C$ 750", clase: "premio-plata" };
            if (puntaje >= 30) return { texto: "C$ 500", clase: "premio-bronce" };
            if (puntaje >= 20) return { texto: "C$ 250", clase: "premio-cobre" };
            if (puntaje >= 10) return { texto: "Vale C$ 100", clase: "premio-vale" };
            return { texto: "Sin premio", clase: "premio-nada" };
        }

        function cambiarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            
            if (tab === 'qr') {
                document.getElementById('panelQR').classList.add('active-panel');
                document.getElementById('panelPuntos').classList.remove('active-panel');
            } else {
                document.getElementById('panelQR').classList.remove('active-panel');
                document.getElementById('panelPuntos').classList.add('active-panel');
                cargarMisPuntos();
            }
        }

        async function cargarMisPuntos() {
            const puntosContent = document.getElementById('puntosContent');
            puntosContent.innerHTML = '<div class="loading-puntos"><i class="fas fa-spinner fa-spin"></i> Cargando tus estadisticas...</div>';
            
            try {
                const response = await fetch(`/api/puntos-vendedor/${vendedor.id}`);
                const data = await response.json();
                
                if (data.success) {
                    const premio = obtenerPremio(data.puntaje_total);
                    
                    let html = `
                        <div class="puntaje-card">
                            <div class="puntaje-valor">${data.puntaje_total} pts</div>
                            <div>Puntaje Total</div>
                            <div class="premio-badge ${premio.clase}">🎁 ${premio.texto}</div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${data.total_ventas}</div>
                                <div class="stat-label">Ventas Realizadas</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.dias_activos}</div>
                                <div class="stat-label">Dias Activos</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.promedio_diario}</div>
                                <div class="stat-label">Promedio Diario</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">C$${data.total_ventas_cordobas || 0}</div>
                                <div class="stat-label">Total Ventas (C$)</div>
                            </div>
                        </div>
                    `;
                    puntosContent.innerHTML = html;
                } else {
                    puntosContent.innerHTML = `<div class="loading-puntos" style="color:#c62828;">Error: ${data.message}</div>`;
                }
            } catch (error) {
                console.error('Error cargando puntos:', error);
                puntosContent.innerHTML = '<div class="loading-puntos" style="color:#c62828;">Error al cargar los datos</div>';
            }
        }

        function mostrarMensaje(texto, esError) {
            const modal = document.createElement('div');
            modal.className = 'modal-message';
            modal.innerHTML = `
                <div class="modal-message-content">
                    <p style="color: ${esError ? '#c62828' : '#2e7d32'}">${texto}</p>
                    <button onclick="this.parentElement.parentElement.remove()">Aceptar</button>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => modal.remove(), 3000);
        }

        function mostrarRecuperacion() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'recuperacionModal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Recuperar Contrasena</h3>
                    <div class="input-group">
                        <label>Correo electronico</label>
                        <input type="email" id="recEmail" placeholder="ejemplo@correo.com">
                    </div>
                    <div class="footer-buttons" style="margin-top:15px;">
                        <button class="btn btn-primary" onclick="enviarRecuperacion()">Enviar</button>
                        <button class="btn btn-secondary" onclick="cerrarModalRecuperacion()">Cancelar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function cerrarModalRecuperacion() {
            const modal = document.getElementById('recuperacionModal');
            if (modal) modal.remove();
        }

        async function enviarRecuperacion() {
            const email = document.getElementById('recEmail').value;
            if (!email) {
                mostrarMensaje('Ingresa tu correo electronico', true);
                return;
            }
            try {
                const response = await fetch('/api/trabajadores/recuperar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (data.success) {
                    mostrarMensaje(`Nueva contraseña temporal: ${data.nuevaPassword}`, false);
                    cerrarModalRecuperacion();
                } else {
                    mostrarMensaje('Error: ' + data.message, true);
                }
            } catch (error) {
                mostrarMensaje('Error de conexion: ' + error.message, true);
            }
        }

        async function cargarTrabajadores() {
            try {
                const response = await fetch('/api/trabajadores/activos');
                const data = await response.json();
                trabajadores = data;
            } catch (error) {
                console.error('Error cargando trabajadores:', error);
            }
        }

        const searchInput = document.getElementById('searchInput');
        const suggestionsDiv = document.getElementById('suggestions');
        const passwordSection = document.getElementById('passwordSection');
        const selectedUserInfo = document.getElementById('selectedUserInfo');
        const selectedUserName = document.getElementById('selectedUserName');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            if (query.length < 1) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            const filtered = trabajadores.filter(t => 
                t.NombreCompleto.toLowerCase().includes(query) ||
                (t.nombre_usuario && t.nombre_usuario.toLowerCase().includes(query))
            );
            if (filtered.length > 0) {
                suggestionsDiv.innerHTML = filtered.map(t => `
                    <div class="suggestion-item" onclick="seleccionarVendedor(${t.Id_Trabajador}, '${t.NombreCompleto.replace(/'/g, "\\'")}', '${t.nombre_usuario || ''}')">
                        <div class="nombre">${t.NombreCompleto}</div>
                        <div class="email">${t.email || 'Sin email'} | Usuario: ${t.nombre_usuario || 'Sin usuario'}</div>
                    </div>
                `).join('');
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        });

        function seleccionarVendedor(id, nombre, usuario) {
            vendedorSeleccionado = { id, nombre, usuario };
            searchInput.value = nombre;
            suggestionsDiv.style.display = 'none';
            selectedUserInfo.classList.remove('hidden');
            selectedUserName.innerHTML = 'Seleccionado: ' + nombre;
            passwordSection.classList.remove('hidden');
        }

        function clearSelection() {
            vendedorSeleccionado = null;
            searchInput.value = '';
            selectedUserInfo.classList.add('hidden');
            passwordSection.classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }

        async function iniciarSesion() {
            if (!vendedorSeleccionado) {
                mostrarMensaje('Primero selecciona tu nombre de la lista', true);
                return;
            }
            const password = document.getElementById('passwordInput').value;
            if (!password) {
                mostrarMensaje('Ingresa tu contrasena', true);
                return;
            }
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Verificando...';
            btn.disabled = true;
            try {
                const response = await fetch('/api/trabajadores/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nombre_usuario: vendedorSeleccionado.usuario || vendedorSeleccionado.nombre, 
                        password: password 
                    })
                });
                const data = await response.json();
                if (data.success) {
                    token = data.token;
                    vendedor = data.trabajador;
                    localStorage.setItem('token_vendedor', token);
                    localStorage.setItem('vendedor', JSON.stringify(vendedor));
                    mostrarApp();
                    cargarQRActivo();
                } else {
                    mostrarMensaje('Error: ' + data.message, true);
                }
            } catch (error) {
                mostrarMensaje('Error de conexion: ' + error.message, true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function mostrarApp() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('vendedorNombre').innerHTML = vendedor.nombre;
            document.getElementById('vendedorId').innerHTML = 'ID: ' + vendedor.id + ' | ' + (vendedor.email || 'Sin email');
        }

        async function cargarQRActivo() {
            try {
                const response = await fetch('/api/vendedor/qr-activo/' + vendedor.id);
                const data = await response.json();
                if (data.tiene_qr_activo && new Date(data.expira) > new Date()) {
                    mostrarQR(data.codigo, data.expira);
                } else {
                    await generarNuevoQR();
                }
            } catch (error) {
                console.error('Error cargando QR:', error);
            }
        }

        async function generarNuevoQR() {
            const btn = document.getElementById('btnGenerar');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Generando...';
            btn.disabled = true;
            try {
                const response = await fetch('/api/vendedor/generar-qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ id_vendedor: vendedor.id, duracion_minutos: 60 })
                });
                const data = await response.json();
                if (data.success) {
                    mostrarQR(data.codigo, data.expira);
                } else {
                    mostrarMensaje('Error: ' + data.message, true);
                }
            } catch (error) {
                mostrarMensaje('Error generando QR: ' + error.message, true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function mostrarQR(codigo, expira) {
            qrActual = codigo;
            document.getElementById('qrContainer').style.display = 'block';
            document.getElementById('tiempoInfo').style.display = 'block';
            document.getElementById('codigoTexto').textContent = codigo;
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: codigo,
                width: 220,
                height: 220,
                colorDark: "#A63C89",
                colorLight: "#ffffff"
            });
            actualizarTiempo(expira);
            if (intervalo) clearInterval(intervalo);
            intervalo = setInterval(() => actualizarTiempo(expira), 1000);
        }

        function actualizarTiempo(expira) {
            const diff = new Date(expira) - new Date();
            const timerDiv = document.getElementById('tiempoInfo');
            const timeSpan = document.getElementById('timerTime');
            if (diff <= 0) {
                timerDiv.className = 'timer-card timer-expired';
                timeSpan.innerHTML = 'EXPIRADO';
                document.getElementById('qrContainer').style.opacity = '0.5';
            } else {
                const minutos = Math.floor(diff / 60000);
                const segundos = Math.floor((diff % 60000) / 1000);
                timerDiv.className = 'timer-card timer-active';
                timeSpan.innerHTML = minutos.toString().padStart(2, '0') + ':' + segundos.toString().padStart(2, '0');
                document.getElementById('qrContainer').style.opacity = '1';
            }
        }

        async function enviarQREmail() {
            if (!vendedor.email) {
                mostrarMensaje('Tu cuenta no tiene correo registrado', true);
                return;
            }
            if (!qrActual) {
                mostrarMensaje('Primero genera un QR', true);
                return;
            }
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Enviando...';
            btn.disabled = true;
            try {
                const response = await fetch('/api/vendedor/enviar-qr-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: vendedor.email,
                        codigo: qrActual,
                        nombre_vendedor: vendedor.nombre
                    })
                });
                const data = await response.json();
                if (data.success) {
                    mostrarMensaje('QR enviado a tu correo', false);
                } else {
                    mostrarMensaje('Error: ' + data.message, true);
                }
            } catch (error) {
                mostrarMensaje('Error: ' + error.message, true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token_vendedor');
            localStorage.removeItem('vendedor');
            token = null;
            vendedor = null;
            if (intervalo) clearInterval(intervalo);
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('appSection').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
            clearSelection();
        }

        cargarTrabajadores();
        const tokenGuardado = localStorage.getItem('token_vendedor');
        const vendedorGuardado = localStorage.getItem('vendedor');
        if (tokenGuardado && vendedorGuardado) {
            token = tokenGuardado;
            vendedor = JSON.parse(vendedorGuardado);
            mostrarApp();
            cargarQRActivo();
        }
    </script>
</body>
</html>
