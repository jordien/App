<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluar Trabajador - Tienda Chepita</title>
    <link rel="stylesheet" href="evaluar_trabajador.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"

    />
    <style>
      .et-main-title h1 {
        font-family: "Playfair Display", serif;
        background: linear-gradient(135deg, #caa0d8, #b57acb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 32px;
      }

      .et-filter-btn,
      .et-clear-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        height: 42px;
      }

      .et-filter-btn {
        background: linear-gradient(135deg, #e7b6d4, #caa0d8);
        color: white;
      }
      .et-clear-btn {
        background: #ef4444;
        color: white;
      }

      .et-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 60px;
        gap: 10px;
        color: #64748b;
      }

      .et-footer {
        text-align: center;
        padding: 20px 30px;
        background: #f8fafc;
        border-top: 1px solid #e2e8f0;
      }

      @media (max-width: 768px) {
        body {
          padding-top: 80px;
        }
        .et-filters {
          flex-direction: column;
        }
        .et-filter-group select {
          width: 100%;
        }
        .et-filter-btn,
        .et-clear-btn,
        .et-back-btn {
          width: 100%;
          justify-content: center;
        }
        .et-table-container {
          overflow-x: auto;
        }
        .et-table {
          min-width: 650px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header-marcas">
      <div class="header-marcas-scroll">
        <div class="header-track">
          <img src="imagenes/marcas/logo1.png" />
          <img src="imagenes/marcas/logo2.png" />
          <img src="imagenes/marcas/logo3.png" />
          <img src="imagenes/marcas/logo4.png" />
          <img src="imagenes/marcas/logo5.png" />
          <img src="imagenes/marcas/logo6.png" />

          <img src="imagenes/marcas/logo1.png" />
          <img src="imagenes/marcas/logo2.png" />
          <img src="imagenes/marcas/logo3.png" />
          <img src="imagenes/marcas/logo4.png" />
          <img src="imagenes/marcas/logo5.png" />
          <img src="imagenes/marcas/logo6.png" />
        </div>
      </div>
    </div>

    <div class="et-container">
      <div class="et-header">
        <div class="et-header-info">
          <h2>Evaluación de Desempeño</h2>
        </div>

        <button
          class="et-back-btn"
          onclick="window.location.href = 'menu_admin.html'"
        >
          <i class="fas fa-arrow-left"></i> Volver
        </button>
      </div>

      <div class="et-filters">
        <div class="et-filter-group">
          <label><i class="fas fa-calendar"></i> Año</label>
          <select id="filterYear">
            <option value="">Todos los años</option>
          </select>
        </div>
        <div class="et-filter-group">
          <label><i class="fas fa-calendar-alt"></i> Mes</label>
          <select id="filterMonth">
            <option value="">Todos los meses</option>
            <option value="1">Enero</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>
          </select>
        </div>
        <button class="et-filter-btn" onclick="aplicarFiltros()">
          <i class="fas fa-search"></i> Filtrar
        </button>
        <button class="et-clear-btn" onclick="limpiarFiltros()">
          <i class="fas fa-eraser"></i> Limpiar
        </button>
      </div>

      <div class="et-table-container">
        <div class="et-loading" id="loadingMessage">
          <i class="fas fa-spinner fa-spin"></i> Cargando...
        </div>
        <div id="resultadosEvaluacion" style="display: none">
          <table class="et-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Trabajador</th>
                <th>Ventas</th>
                <th>Días Activos</th>
                <th>Promedio Diario</th>
                <th>Puntaje Total</th>
                <th>Premio</th>
              </tr>
            </thead>
            <tbody id="tablaEvaluacion"></tbody>
          </table>
        </div>
      </div>

      <div class="et-footer">
        <p>
          <i class="fas fa-chart-simple"></i> Sistema de Evaluación de Desempeño
          - Versión 1.0
        </p>
      </div>
    </div>

    <script>
      function obtenerPremio(puntaje) {
        if (puntaje >= 50)
          return { texto: "🏆 C$ 1,000 + Diploma", clase: "premio-oro" };
        if (puntaje >= 40) return { texto: "💰 C$ 750", clase: "premio-plata" };
        if (puntaje >= 30)
          return { texto: "💰 C$ 500", clase: "premio-bronce" };
        if (puntaje >= 20) return { texto: "💰 C$ 250", clase: "premio-cobre" };
        if (puntaje >= 10)
          return { texto: "🎁 Vale C$ 100", clase: "premio-vale" };
        return { texto: "❌ Sin premio", clase: "premio-nada" };
      }

      /*  function mostrarFecha() {
        const fecha = new Date().toLocaleDateString("es-ES", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });
        document.getElementById("currentDate").innerHTML =
          `<i class="fas fa-calendar-alt"></i> ${fecha}`;
        document.getElementById("headerDate").innerHTML =
          `<i class="fas fa-calendar-alt"></i> ${fecha}`;
      }*/

      function cargarAnios() {
        const select = document.getElementById("filterYear");
        const añoActual = new Date().getFullYear();
        select.innerHTML = '<option value="">Todos los años</option>';
        for (let i = añoActual; i >= añoActual - 5; i--) {
          select.innerHTML += `<option value="${i}">${i}</option>`;
        }
      }

      async function cargarEvaluacion(year, month) {
        const loadingDiv = document.getElementById("loadingMessage");
        const resultadosDiv = document.getElementById("resultadosEvaluacion");
        const tablaBody = document.getElementById("tablaEvaluacion");

        loadingDiv.style.display = "flex";
        resultadosDiv.style.display = "none";

        try {
          let url = "/api/puntos-vendedores";
          const params = [];
          if (year) params.push(`year=${year}`);
          if (month) params.push(`month=${month}`);
          if (params.length > 0) url += `?${params.join("&")}`;

          const respuesta = await fetch(url);
          if (!respuesta.ok) throw new Error(`Error HTTP: ${respuesta.status}`);

          const datos = await respuesta.json();

          if (!datos.length) {
            tablaBody.innerHTML =
              '<tr><td colspan="7" style="text-align:center;padding:40px;">📭 No hay datos de ventas para el período seleccionado.</td></tr>';
          } else {
            tablaBody.innerHTML = "";
            datos.forEach((trabajador) => {
              const premio = obtenerPremio(trabajador.puntaje_total);
              tablaBody.innerHTML += `
                        <tr>
                            <td>${trabajador.id_trabajador}</td>
                            <td><strong>${trabajador.nombre_completo}</strong></td>
                            <td>${trabajador.total_ventas}</td>
                            <td>${trabajador.dias_activos}</td>
                            <td>${trabajador.promedio_diario}</td>
                            <td class="et-puntaje">${trabajador.puntaje_total}</td>
                            <td><span class="${premio.clase}">${premio.texto}</span></td>
                        </tr>
                    `;
            });
          }

          loadingDiv.style.display = "none";
          resultadosDiv.style.display = "block";
        } catch (error) {
          console.error("Error:", error);
          loadingDiv.innerHTML =
            '<i class="fas fa-exclamation-triangle"></i> Error al cargar los datos. Verifica que el servidor esté corriendo.';
        }
      }

      function aplicarFiltros() {
        const year = document.getElementById("filterYear").value;
        const month = document.getElementById("filterMonth").value;
        cargarEvaluacion(year, month);
      }

      function limpiarFiltros() {
        document.getElementById("filterYear").value = "";
        document.getElementById("filterMonth").value = "";
        cargarEvaluacion("", "");
      }

      /*mostrarFecha();*/
      cargarAnios();
      cargarEvaluacion("", "");
    </script>

    <style>
      .premio-oro,
      .premio-plata,
      .premio-bronce,
      .premio-cobre,
      .premio-vale,
      .premio-nada {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        display: inline-block;
      }
      .premio-oro {
        background: linear-gradient(135deg, #fef3c7, #fde68a);
        color: #92400e;
      }
      .premio-plata {
        background: linear-gradient(135deg, #f0fdf4, #dcfce7);
        color: #166534;
      }
      .premio-bronce {
        background: linear-gradient(135deg, #fefce8, #fef08a);
        color: #854d0e;
      }
      .premio-cobre {
        background: linear-gradient(135deg, #fff7ed, #fed7aa);
        color: #9a3412;
      }
      .premio-vale {
        background: linear-gradient(135deg, #e0f2fe, #bae6fd);
        color: #0369a1;
      }
      .premio-nada {
        background: #f1f5f9;
        color: #64748b;
      }
    </style>
  </body>
</html>
