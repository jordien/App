<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Cuenta - Chepita</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        .header {
            background: linear-gradient(135deg, #A63C89 0%, #7B2C64 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }
        .content { padding: 30px; }
        .info-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #A63C89;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #A63C89;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #A63C89 0%, #7B2C64 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 ¡Bienvenido a Chepita!</h1>
            <p>Configura tu cuenta para comenzar</p>
        </div>
        <div class="content">
            <div id="message" class="message"></div>
            <div id="infoUsuario" class="info-card" style="display: none;">
                <p>👋 <strong id="nombreUsuario"></strong></p>
                <p>📧 <strong id="emailUsuario"></strong></p>
                <p>🔑 <strong>Usuario:</strong> <span id="usuarioLogin"></span></p>
            </div>
            <form id="registroForm">
                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu nueva contraseña" required>
                </div>
                <div class="form-group">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" placeholder="Confirma tu contraseña" required>
                </div>
                <button type="submit" id="btnSubmit">Configurar Contraseña</button>
            </form>
            <div style="text-align: center; margin-top: 20px;">
                <a href="/login_caja.html" style="color: #A63C89;">← Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
    <script>
        let token = null;
        
        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }
        
        async function verificarToken() {
            token = getTokenFromUrl();
            if (!token) {
                mostrarMensaje('No se encontró un token válido.', 'error');
                document.getElementById('btnSubmit').disabled = true;
                return;
            }
            
            try {
                const response = await fetch(`/api/verificar-token-registro/${token}`);
                const data = await response.json();
                if (!data.valido) {
                    mostrarMensaje(data.message || 'El enlace ha expirado o ya fue usado.', 'error');
                    document.getElementById('btnSubmit').disabled = true;
                    return;
                }
                document.getElementById('infoUsuario').style.display = 'block';
                document.getElementById('nombreUsuario').textContent = data.nombre;
                document.getElementById('emailUsuario').textContent = data.email;
                document.getElementById('usuarioLogin').textContent = data.usuario;
            } catch (error) {
                mostrarMensaje('Error al verificar el enlace.', 'error');
                document.getElementById('btnSubmit').disabled = true;
            }
        }
        
        function mostrarMensaje(mensaje, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = mensaje;
            messageDiv.className = `message ${tipo}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.className = 'message';
            }, 5000);
        }
        
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                mostrarMensaje('Las contraseñas no coinciden', 'error');
                return;
            }
            if (password.length < 4) {
                mostrarMensaje('La contraseña debe tener al menos 4 caracteres', 'error');
                return;
            }
            
            const btn = document.getElementById('btnSubmit');
            btn.innerHTML = '<span class="loading"></span> Procesando...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/completar-registro-trabajador', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nueva_password: password })
                });
                const data = await response.json();
                if (data.success) {
                    mostrarMensage('✅ ' + data.message, 'success');
                    setTimeout(() => window.location.href = '/login_caja.html', 3000);
                } else {
                    mostrarMensaje(data.message || 'Error al configurar la contraseña', 'error');
                    btn.innerHTML = 'Configurar Contraseña';
                    btn.disabled = false;
                }
            } catch (error) {
                mostrarMensaje('Error al conectar con el servidor', 'error');
                btn.innerHTML = 'Configurar Contraseña';
                btn.disabled = false;
            }
        });
        
        verificarToken();
    </script>
</body>
</html>
