<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña - Chepita</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .header {
            background: linear-gradient(135deg, #A63C89 0%, #7B2C64 100%);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
        }
        .content { padding: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #A63C89;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Cambiar Contraseña</h1>
            <p>Es tu primera vez, crea una contraseña segura</p>
        </div>
        <div class="content">
            <div id="message" class="message"></div>
            <input type="password" id="newPassword" placeholder="Nueva contraseña">
            <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
            <button onclick="cambiarPassword()">Guardar Contraseña</button>
        </div>
    </div>
    <script>
        const trabajador = JSON.parse(localStorage.getItem('trabajador') || '{}');
        if (!trabajador.id) window.location.href = '/login_caja.html';
        
        async function cambiarPassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (newPass !== confirmPass) {
                showMessage('Las contraseñas no coinciden', 'error');
                return;
            }
            if (newPass.length < 4) {
                showMessage('La contraseña debe tener al menos 4 caracteres', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/trabajadores/cambiar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_trabajador: trabajador.id, nueva_password: newPass })
                });
                const data = await response.json();
                if (data.success) {
                    trabajador.debe_cambiar_password = false;
                    localStorage.setItem('trabajador', JSON.stringify(trabajador));
                    showMessage('✅ Contraseña actualizada. Redirigiendo...', 'success');
                    setTimeout(() => window.location.href = '/menu_caja.html', 2000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Error de conexión', 'error');
            }
        }
        
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.textContent = msg;
            div.className = `message ${type}`;
            setTimeout(() => {
                div.style.display = 'none';
                div.className = 'message';
            }, 3000);
        }
    </script>
</body>
</html>
